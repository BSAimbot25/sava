<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SillySava Merch</title>
  <style>
    body{margin:0;font-family:system-ui;background:#0b0b12;color:#fff}
    .top{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#121427;border-bottom:1px solid rgba(255,255,255,.15)}
    .logo{font-weight:900;color:#ffe700;font-size:1.2rem}
    .back{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800}
    .wrap{width:min(1200px,calc(100% - 20px));margin:16px auto}
    .note{background:#171b33;border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:10px 12px;margin-bottom:12px;color:#d9dcff}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
    .card{background:#171b33;border:1px solid rgba(255,255,255,.16);border-radius:14px;overflow:hidden}
    .imgs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid rgba(255,255,255,.12)}
    .shot{position:relative}
    .imgs img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#0f1224}
    .label{position:absolute;left:8px;top:8px;background:rgba(0,0,0,.65);padding:4px 8px;border-radius:999px;font-size:.72rem;font-weight:700}
    .meta{padding:10px}
    .meta h3{margin:0 0 6px;font-size:1rem}
    .sub{opacity:.85;font-size:.9rem;margin-bottom:4px}
    .go{display:inline-block;margin-top:8px;background:#00ffc8;color:#062d24;text-decoration:none;padding:8px 12px;border-radius:10px;font-weight:800}
  </style>
</head>
<body>
<header class="top">
  <div class="logo">SILLYSAVA MERCH</div>
  <a class="back" href="./index.html">Back</a>
</header>

<main class="wrap">
  <section class="grid" id="grid"></section>
</main>

<script>
const products = [
  { title:'Winchester Tee', variants:46, front:'https://images-api.printify.com/mockup/69a4399b9f7e893e8a0e4941/12100/92570/winchester-tee.jpg?camera_label=front', back:'https://images-api.printify.com/mockup/69a4399b9f7e893e8a0e4941/12100/92571/winchester-tee.jpg?camera_label=back', url:'https://pouchmastersava.printify.me/product/27107362' },
  { title:'Sava Tee', variants:46, front:'https://images-api.printify.com/mockup/69a439a7eb470f86b105f29c/12100/92570/sava-tee.jpg?camera_label=front', back:'https://images-api.printify.com/mockup/69a439a7eb470f86b105f29c/12100/92571/sava-tee.jpg?camera_label=back', url:'https://pouchmastersava.printify.me/product/27107364' },
  { title:'Saveliy Tee', variants:46, front:'https://images-api.printify.com/mockup/69a439b3414758b6c60315b2/12100/92570/saveliy-tee.jpg?camera_label=front', back:'https://images-api.printify.com/mockup/69a439b3414758b6c60315b2/12100/92571/saveliy-tee.jpg?camera_label=back', url:'https://pouchmastersava.printify.me/product/27107365' },
  { title:'Winchester Tank', variants:24, front:'https://images-api.printify.com/mockup/69a43a8a46730b56700a6212/24828/101889/winchester-tank.jpg?camera_label=front', back:'https://images-api.printify.com/mockup/69a43a8a46730b56700a6212/24828/101892/winchester-tank.jpg?camera_label=back', url:'https://pouchmastersava.printify.me/product/27107390' },
  { title:'Sava Baby Tee (Joke)', variants:13, front:'https://images-api.printify.com/mockup/69a43a9346730b56700a6213/95962/81229/sava-baby-tee-joke.jpg?camera_label=front', back:'https://images-api.printify.com/mockup/69a43a9346730b56700a6213/95962/81241/sava-baby-tee-joke.jpg?camera_label=back', url:'https://pouchmastersava.printify.me/product/27107391' },
  { title:'Winchester Toddler Tee (Joke)', variants:2, front:'https://images-api.printify.com/mockup/69a43a9d1ec5ca402c037494/72048/100703/winchester-toddler-tee-joke.jpg?camera_label=front', back:'https://images-api.printify.com/mockup/69a43a9d1ec5ca402c037494/72048/100704/winchester-toddler-tee-joke.jpg?camera_label=back', url:'https://pouchmastersava.printify.me/product/27107392' }
];

const grid = document.getElementById('grid');
products.forEach(p => {
  const card = document.createElement('article');
  card.className = 'card';
  card.innerHTML = `
    <div class="imgs">
      <div class="shot"><img src="${p.front}" alt="${p.title} front" loading="lazy"><span class="label">Front</span></div>
      <div class="shot"><img src="${p.back}" alt="${p.title} back" loading="lazy"><span class="label">Back</span></div>
    </div>
    <div class="meta">
      <h3>${p.title}</h3>
      <div class="sub">Variants/Sizes: ${p.variants}</div>
      <a class="go" href="${p.url}" target="_blank" rel="noopener">Buy Now</a>
    </div>`;
  grid.appendChild(card);
});
</script>
<script type="module">import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script>
</body>
</html>
