<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Sava Snake</title><style>body{margin:0;background:#07111f;color:#fff;font-family:system-ui}.top{display:flex;justify-content:space-between;padding:10px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}canvas{display:block;margin:0 auto;background:#0f1530;border:2px solid #fff;border-radius:12px;max-width:96vw}.controls{display:grid;grid-template-columns:repeat(3,72px);justify-content:center;gap:6px;margin:8px}.controls button{padding:10px;border:0;border-radius:8px;background:#1f2a55;color:#fff;font-weight:900}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><div id='hud'>Score: 0</div></div><canvas id='c' width='400' height='400'></canvas><div class='controls'><span></span><button id='u'>▲</button><span></span><button id='l'>◀</button><button id='d'>▼</button><button id='r'>▶</button></div><script>const KEY='sava_arcade_v1';function db(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return {}}}function save(v){localStorage.setItem(KEY,JSON.stringify(v));}function record(game,score){const d=db(); if(!d.player){d.player='Player'}; d.records=d.records||{}; d.records[game]=d.records[game]||[]; d.records[game].push({name:d.player,score:+score,t:Date.now()}); d.records[game].sort((a,b)=>b.score-a.score); d.records[game]=d.records[game].slice(0,30); save(d);}const c=document.getElementById('c'),x=c.getContext('2d');const N=20,S=20;let dir={x:1,y:0},next={x:1,y:0};let snake=[{x:8,y:10},{x:7,y:10},{x:6,y:10}],food={x:14,y:12},score=0;function placeFood(){while(true){const f={x:(Math.random()*N)|0,y:(Math.random()*N)|0};if(!snake.some(s=>s.x===f.x&&s.y===f.y)){food=f;return;}}}function hud(){document.getElementById('hud').textContent='Score: '+score;}function reset(){record('snake',score);score=0;snake=[{x:8,y:10},{x:7,y:10},{x:6,y:10}];dir=next={x:1,y:0};placeFood();}function step(){dir=next;const h={x:(snake[0].x+dir.x+N)%N,y:(snake[0].y+dir.y+N)%N};if(snake.some(s=>s.x===h.x&&s.y===h.y))reset();snake.unshift(h);if(h.x===food.x&&h.y===food.y){score+=10;placeFood();}else snake.pop();draw();hud();}function draw(){x.clearRect(0,0,400,400);x.fillStyle='#1b2f65';x.fillRect(0,0,400,400);x.fillStyle='#ffe700';snake.forEach(s=>x.fillRect(s.x*S+1,s.y*S+1,S-2,S-2));x.fillStyle='#00ffc8';x.fillRect(food.x*S+2,food.y*S+2,S-4,S-4);}function setn(nx,ny){if(nx===-dir.x&&ny===-dir.y)return;next={x:nx,y:ny}}addEventListener('keydown',e=>{if(e.key==='ArrowUp')setn(0,-1);if(e.key==='ArrowDown')setn(0,1);if(e.key==='ArrowLeft')setn(-1,0);if(e.key==='ArrowRight')setn(1,0);});u.onclick=()=>setn(0,-1);d.onclick=()=>setn(0,1);l.onclick=()=>setn(-1,0);r.onclick=()=>setn(1,0);setInterval(step,110);hud();</script></body></html>
