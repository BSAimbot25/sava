<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Sava Snake</title><style>body{margin:0;background:#07111f;color:#fff;font-family:system-ui}.top{display:flex;justify-content:space-between;padding:10px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}canvas{display:block;margin:0 auto;background:#0f1530;border:2px solid #fff;border-radius:12px;max-width:96vw}.hud{font-weight:800}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><div class='hud' id='hud'>Score: 0 | Best: 0</div></div><canvas id='c' width='400' height='400'></canvas><script>const c=document.getElementById('c'),x=c.getContext('2d');const N=20,S=20;let dir={x:1,y:0},next={x:1,y:0};let snake=[{x:8,y:10},{x:7,y:10},{x:6,y:10}],food={x:14,y:12},score=0;const key='sava_scores';function load(){try{return JSON.parse(localStorage.getItem(key)||'{"tetris":0,"dodge":0,"snake":0}')}catch{return {tetris:0,dodge:0,snake:0}}}function saveBest(v){const d=load();if(v>d.snake){d.snake=v;localStorage.setItem(key,JSON.stringify(d));}hud()}function hud(){const b=load().snake||0;document.getElementById('hud').textContent=`Score: ${score} | Best: ${b}`;}hud();function placeFood(){while(true){const f={x:(Math.random()*N)|0,y:(Math.random()*N)|0};if(!snake.some(s=>s.x===f.x&&s.y===f.y)){food=f;return;}}}function step(){dir=next;const h={x:(snake[0].x+dir.x+N)%N,y:(snake[0].y+dir.y+N)%N};if(snake.some(s=>s.x===h.x&&s.y===h.y)){saveBest(score);score=0;snake=[{x:8,y:10},{x:7,y:10},{x:6,y:10}];dir=next={x:1,y:0};placeFood();}snake.unshift(h);if(h.x===food.x&&h.y===food.y){score+=10;placeFood();saveBest(score);}else snake.pop();draw();hud();}function draw(){x.clearRect(0,0,400,400);x.fillStyle='#1b2f65';x.fillRect(0,0,400,400);x.fillStyle='#ffe700';snake.forEach(s=>x.fillRect(s.x*S+1,s.y*S+1,S-2,S-2));x.fillStyle='#00ffc8';x.fillRect(food.x*S+2,food.y*S+2,S-4,S-4);}addEventListener('keydown',e=>{if(e.key==='ArrowUp'&&dir.y!==1)next={x:0,y:-1};if(e.key==='ArrowDown'&&dir.y!==-1)next={x:0,y:1};if(e.key==='ArrowLeft'&&dir.x!==1)next={x:-1,y:0};if(e.key==='ArrowRight'&&dir.x!==-1)next={x:1,y:0};});setInterval(step,110);</script></body></html>
