<!doctype html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Player Profile</title><style>body{margin:0;font-family:system-ui;background:linear-gradient(160deg,#090f25,#12193f);color:#fff}.wrap{width:min(920px,calc(100% - 20px));margin:16px auto}.btn{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800;border:0;cursor:pointer}.card{background:#171f47;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:14px;margin-top:12px}.muted{opacity:.82}.role{display:inline-block;padding:5px 10px;border-radius:999px;font-weight:800}.master{background:#ffe700;color:#111}.slave{background:#7cc3ff;color:#05223c}textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ffffff33;background:#0d1434;color:#fff;min-height:72px}.chip{display:inline-block;background:#101833;border:1px solid #2b3762;border-radius:999px;padding:5px 10px;margin-right:6px}.comment{background:#101833;border:1px solid #2b3762;border-radius:10px;padding:8px;margin:8px 0}</style></head><body><div class='wrap'><a class='btn' href='./games.html'>← Games</a><div class='card'><img id='avatar' src='./1.jpg' alt='avatar' style='width:84px;height:84px;border-radius:50%;object-fit:cover;border:2px solid #ffffff44'/><h2 id='name'>Player</h2><p>Role: <span id='role' class='role slave'>Silkin Slave</span></p><p><span class='chip'>Followers: <b id='followers'>0</b></span><span class='chip'>Following: <b id='following'>0</b></span></p><p class='muted' id='status'></p><p class='muted' id='bio'></p><p>Favorite game: <b id='fav'>tetris</b></p><button id='followBtn' class='btn' style='display:none'>Follow</button></div><div class='card'><h3>Top Scores</h3><ul id='scores'></ul></div><div class='card'><h3>Wall Comments</h3><div id='commentBox' style='display:none'><textarea id='commentText' maxlength='220' placeholder='Write a comment...'></textarea><button id='postComment' class='btn' style='margin-top:8px'>Post Comment</button></div><div id='comments'></div></div></div><script type='module' src='./instant.js'></script><script>const q=new URLSearchParams(location.search);const username=(q.get('u')||'').trim();const me=(localStorage.getItem('sava_current_user_v1')||'').trim();const USERS_KEY='sava_users_v1';function users(){try{return JSON.parse(localStorage.getItem(USERS_KEY)||'{}')}catch{return {}}}function setProfile(u){name.textContent=u?.displayName||u?.username||username;const rl=u?.role||'Silkin Slave';role.textContent=rl;role.className='role '+(rl==='Master Sava'?'master':'slave');status.textContent=u?.statusText||'';bio.textContent=u?.bio||'No bio yet';fav.textContent=u?.favGame||'tetris';if(u?.avatarUrl) avatar.src=u.avatarUrl;}function renderComments(list){comments.innerHTML=list.length?list.map(c=>`<div class='comment'><b>${c.author}</b><div>${(c.text||'').replace(/</g,'&lt;')}</div></div>`).join(''):'<p class="muted">No comments yet</p>';}async function run(){if(!username){name.textContent='No user provided';return;}if(window.InstantSync){try{const u=await window.InstantSync.fetchUserProfile(username);setProfile(u||{username});const mine=await window.InstantSync.fetchUserScores(username);scores.innerHTML=mine.length?mine.slice(0,20).map(r=>`<li><strong>${r.game}</strong>: ${Math.floor(r.score)}</li>`).join(''):'<li>No scores yet</li>';const st=await window.InstantSync.followStats(username);followers.textContent=st.followers;following.textContent=st.following;const comm=await window.InstantSync.fetchComments(username);renderComments(comm);if(me && me.toLowerCase()!==username.toLowerCase()){followBtn.style.display='inline-block';commentBox.style.display='block';const f=await window.InstantSync.isFollowing(username);followBtn.textContent=f?'Unfollow':'Follow';followBtn.onclick=async()=>{if(followBtn.textContent==='Follow'){await window.InstantSync.follow(username);followBtn.textContent='Unfollow';}else{await window.InstantSync.unfollow(username);followBtn.textContent='Follow';}const ns=await window.InstantSync.followStats(username);followers.textContent=ns.followers;};postComment.onclick=async()=>{const t=commentText.value.trim();if(!t)return;await window.InstantSync.addComment(username,t);commentText.value='';renderComments(await window.InstantSync.fetchComments(username));};}return;}catch{}}
const lu=users();const k=Object.keys(lu).find(k=>k.toLowerCase()===username.toLowerCase());setProfile(k?lu[k]:{username});scores.innerHTML='<li>No synced scores available</li>';}run();</script></body></html>
