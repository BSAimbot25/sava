<!doctype html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Player Profile</title><style>body{margin:0;font-family:system-ui;background:linear-gradient(160deg,#090f25,#12193f);color:#fff}.wrap{width:min(900px,calc(100% - 20px));margin:16px auto}.btn{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800}.card{background:#171f47;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:14px;margin-top:12px}.muted{opacity:.82}.role{display:inline-block;padding:5px 10px;border-radius:999px;font-weight:800}.master{background:#ffe700;color:#111}.slave{background:#7cc3ff;color:#05223c}</style></head><body><div class='wrap'><a class='btn' href='./games.html'>← Games</a><div class='card'><h2 id='name'>Player</h2><p>Role: <span id='role' class='role slave'>Silkin Slave</span></p><p class='muted' id='bio'></p><p>Favorite game: <b id='fav'>tetris</b></p></div><div class='card'><h3>Top Scores</h3><ul id='scores'></ul></div></div><script type='module' src='./instant.js'></script><script>const q=new URLSearchParams(location.search);const username=(q.get('u')||'').trim();const USERS_KEY='sava_users_v1';function users(){try{return JSON.parse(localStorage.getItem(USERS_KEY)||'{}')}catch{return {}}}function setProfile(u){name.textContent=u?.displayName||u?.username||username;const rl=u?.role||'Silkin Slave';role.textContent=rl;role.className='role '+(rl==='Master Sava'?'master':'slave');bio.textContent=u?.bio||'No bio yet';fav.textContent=u?.favGame||'tetris'}async function run(){if(!username){name.textContent='No user provided';return;}if(window.InstantSync){try{const u=await window.InstantSync.fetchUserProfile(username);setProfile(u||{username});const mine=await window.InstantSync.fetchUserScores(username);scores.innerHTML=mine.length?mine.slice(0,20).map(r=>`<li><strong>${r.game}</strong>: ${Math.floor(r.score)}</li>`).join(''):'<li>No scores yet</li>';return;}catch{}}const lu=users();const k=Object.keys(lu).find(k=>k.toLowerCase()===username.toLowerCase());setProfile(k?lu[k]:{username});scores.innerHTML='<li>No synced scores available</li>';}run();</script></body></html>
