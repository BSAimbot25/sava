<!doctype html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'/><title>Space Sava Dodge</title><style>html,body{margin:0;background:#050812;color:#fff;font-family:system-ui;overflow:hidden;height:100%;touch-action:none}.page{height:100%;display:grid;grid-template-rows:auto 1fr auto;gap:8px;padding:8px}.top{display:flex;gap:10px;align-items:center;justify-content:space-between}.btn{background:#ffe700;color:#111;text-decoration:none;padding:7px 10px;border-radius:999px;font-weight:800}canvas{width:100%;height:100%;background:radial-gradient(circle at 50% 20%,#15264f,#070c1d);border:2px solid #fff;border-radius:10px}.hud{display:flex;gap:10px;align-items:center}.controls{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}.pill{padding:8px 10px;border-radius:10px;background:#1f2a55;font-weight:800}.cbtn{border:0;border-radius:10px;background:#1f2a55;color:#fff;padding:10px 12px;font-weight:900}</style></head><body><div class='page'><div class='top'><a class='btn' href='./games.html'>← Menu</a><a class='btn' href='./leaderboard.html?game=dodge'>Leaderboard</a><div class='hud'><strong id='s'>Score: 0</strong><span id='state'>Survive</span></div></div><canvas id='c'></canvas><div class='controls'><div class='pill'>Drag anywhere to move • Avoid giraffes</div><button class='cbtn' id='pause'>Pause</button><button class='cbtn' id='restart'>Restart</button></div></div><script type='module' src='./instant.js'></script><script>function getPlayer(){return localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'Player'}async function record(score){try{if(window.InstantSync) await window.InstantSync.submitScore('dodge',getPlayer(),+score);}catch{} try{await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'dodge',name:getPlayer(),score:+score})});}catch{}}
const c=document.getElementById('c'),x=c.getContext('2d');const scoreEl=document.getElementById('s'),state=document.getElementById('state');const sava=new Image();sava.src='./1.jpg';const canImg=new Image();canImg.src='./can.jpg';const giraffe='🦒';
let stars=[];function mkStars(){stars=Array.from({length:90},()=>({x:Math.random()*c.width,y:Math.random()*c.height,s:1+Math.random()*1.5,v:8+Math.random()*24}))}
function fit(){c.width=innerWidth-16;c.height=innerHeight-130;mkStars()}fit();addEventListener('resize',fit);
let player,obs,score,alive,last,spawnT,difficulty,keys={},paused=false;function reset(){player={x:c.width/2,y:c.height/2,r:22,vx:0,vy:0};obs=[];score=0;alive=true;paused=false;last=0;spawnT=0;difficulty=1;state.textContent='Survive';scoreEl.textContent='Score: 0';}
reset();
function spawn(){const side=(Math.random()*4)|0;let sx=0,sy=0;if(side===0){sx=Math.random()*c.width;sy=-25}if(side===1){sx=c.width+25;sy=Math.random()*c.height}if(side===2){sx=Math.random()*c.width;sy=c.height+25}if(side===3){sx=-25;sy=Math.random()*c.height}const ang=Math.atan2(player.y-sy,player.x-sx)+(Math.random()-.5)*0.55;const speed=1.3+difficulty*0.38+Math.random()*1.25;const useCan=(score>=1000&&Math.random()<0.42);obs.push({type:useCan?'can':'giraffe',x:sx,y:sy,vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed,s:(useCan?42:22)+Math.random()*(useCan?16:16),spin:Math.random()*6.28})}
function hit(o){const dx=player.x-o.x,dy=player.y-o.y;const k=o.type==='can'?0.36:0.3;return Math.hypot(dx,dy)<player.r+o.s*k}
let drag=false,px=0,py=0;c.onpointerdown=e=>{if(!alive){reset();return;}drag=true;px=e.clientX;py=e.clientY};addEventListener('pointerup',()=>{drag=false});addEventListener('pointermove',e=>{if(!drag||!alive||paused)return;const dx=e.clientX-px,dy=e.clientY-py;px=e.clientX;py=e.clientY;player.vx=Math.max(-7,Math.min(7,dx*0.28));player.vy=Math.max(-7,Math.min(7,dy*0.28))});
addEventListener('keydown',e=>{keys[e.key]=true;if(e.key==='p'||e.key==='P'){paused=!paused;state.textContent=paused?'Paused':'Survive'}if(!alive&&(e.key===' '||e.key==='Enter'))reset()});addEventListener('keyup',e=>keys[e.key]=false);
document.getElementById('pause').onclick=()=>{paused=!paused;state.textContent=paused?'Paused':'Survive'};document.getElementById('restart').onclick=()=>reset();
function step(ts){if(!last)last=ts;const dt=Math.min(33,(ts-last)||16);last=ts;if(alive&&!paused){difficulty=1+score/820;const spawnEvery=Math.max(220,780-difficulty*52);spawnT+=dt;while(spawnT>spawnEvery){spawnT-=spawnEvery;spawn()}const ax=((keys['ArrowRight']||keys['d']?1:0)-(keys['ArrowLeft']||keys['a']?1:0))*0.55;const ay=((keys['ArrowDown']||keys['s']?1:0)-(keys['ArrowUp']||keys['w']?1:0))*0.55;player.vx=(player.vx+ax)*0.93;player.vy=(player.vy+ay)*0.93;player.x+=player.vx*(dt/16);player.y+=player.vy*(dt/16);player.x=Math.max(player.r,Math.min(c.width-player.r,player.x));player.y=Math.max(player.r,Math.min(c.height-player.r,player.y));for(const st of stars){st.y+=st.v*(dt/16);if(st.y>c.height){st.y=0;st.x=Math.random()*c.width}}for(const o of obs){o.x+=o.vx*(dt/16);o.y+=o.vy*(dt/16);o.spin+=0.04+o.vx*0.002}obs=obs.filter(o=>o.x>-90&&o.x<c.width+90&&o.y>-90&&o.y<c.height+90);for(const o of obs){if(hit(o)){alive=false;record(Math.floor(score));state.textContent='Game over - tap restart';break}}score+=dt*0.011*(1+difficulty*0.12);const sc=Math.floor(score);scoreEl.textContent='Score: '+sc;if(sc>=1000&&state.textContent==='Survive')state.textContent='Level 2: cans unlocked';}draw();requestAnimationFrame(step)}requestAnimationFrame(step);
function draw(){x.clearRect(0,0,c.width,c.height);x.fillStyle='rgba(255,255,255,.2)';for(const st of stars)x.fillRect(st.x,st.y,st.s,st.s);for(const o of obs){x.save();x.translate(o.x,o.y);x.rotate(o.spin);if(o.type==='can'){x.beginPath();x.arc(0,0,o.s*0.5,0,Math.PI*2);x.clip();x.drawImage(canImg,-o.s*0.5,-o.s*0.5,o.s,o.s);x.lineWidth=2;x.strokeStyle='rgba(255,255,255,.65)';x.beginPath();x.arc(0,0,o.s*0.5,0,Math.PI*2);x.stroke();}else{x.font=o.s+'px serif';x.fillText(giraffe,-o.s*0.34,o.s*0.28);}x.restore()}const angle=Math.atan2(player.vy,player.vx)||0;x.save();x.translate(player.x,player.y);x.rotate(angle);x.beginPath();x.arc(0,0,player.r,0,Math.PI*2);x.clip();x.drawImage(sava,-player.r,-player.r,player.r*2,player.r*2);x.restore();x.strokeStyle='#fff';x.lineWidth=2;x.beginPath();x.arc(player.x,player.y,player.r,0,Math.PI*2);x.stroke();if(paused){x.fillStyle='rgba(0,0,0,.45)';x.fillRect(0,0,c.width,c.height);x.fillStyle='#fff';x.font='bold 36px system-ui';x.fillText('PAUSED',c.width/2-75,c.height/2)}}
</script><script type="module">import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script>
</body></html>
