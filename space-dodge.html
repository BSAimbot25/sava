<!doctype html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1'/><title>Space Sava Dodge</title><style>html,body{margin:0;background:#050812;color:#fff;font-family:system-ui;overflow:hidden;height:100%}.page{height:100%;display:grid;grid-template-rows:auto 1fr;gap:8px;padding:8px}.top{display:flex;gap:10px;align-items:center;justify-content:space-between}.btn{background:#ffe700;color:#111;text-decoration:none;padding:7px 10px;border-radius:999px;font-weight:800}canvas{width:100%;height:100%;background:radial-gradient(circle at 50% 20%,#15264f,#070c1d);border:2px solid #fff;border-radius:10px}.hud{display:flex;gap:10px;align-items:center}</style></head><body><div class='page'><div class='top'><a class='btn' href='./games.html'>← Menu</a><div class='hud'><strong id='s'>Score: 0</strong><span id='state'>Survive</span></div></div><canvas id='c'></canvas></div><script>const KEY='sava_arcade_v1';function db(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return {}}}function getPlayer(){const d=db();return d.player||'Player'}async function record(score){try{await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'dodge',name:getPlayer(),score:+score})});}catch{}}const c=document.getElementById('c'),x=c.getContext('2d');const scoreEl=document.getElementById('s'),state=document.getElementById('state');const sava=new Image();sava.src='./1.jpg';const giraffe='🦒';function fit(){c.width=innerWidth-16;c.height=innerHeight-66;mkStars();}fit();addEventListener('resize',fit);let player,obs,score,alive,last,spawnT,difficulty,keys={},stars=[];function mkStars(){stars=Array.from({length:70},()=>({x:Math.random()*c.width,y:Math.random()*c.height,s:1+Math.random()*1.6,v:8+Math.random()*22}));}function reset(){player={x:c.width/2,y:c.height/2,r:24,vx:0,vy:0};obs=[];score=0;alive=true;last=0;spawnT=0;difficulty=1;state.textContent='Survive';scoreEl.textContent='Score: 0';if(!stars.length)mkStars();}reset();function spawn(){const side=(Math.random()*4)|0;let sx,sy;if(side===0){sx=Math.random()*c.width;sy=-25}if(side===1){sx=c.width+25;sy=Math.random()*c.height}if(side===2){sx=Math.random()*c.width;sy=c.height+25}if(side===3){sx=-25;sy=Math.random()*c.height}const ang=Math.atan2(player.y-sy,player.x-sx)+(Math.random()-.5)*0.65;const speed=1.4+difficulty*0.45+Math.random()*1.4;obs.push({x:sx,y:sy,vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed,s:24+Math.random()*18,spin:Math.random()*6.28});}function hit(o){const dx=player.x-o.x,dy=player.y-o.y;return Math.hypot(dx,dy)<player.r+o.s*0.32;}let drag=false,px=0,py=0;c.onpointerdown=e=>{if(!alive){reset();return;}drag=true;px=e.clientX;py=e.clientY;};addEventListener('pointerup',()=>{drag=false;player.vx*=0.4;player.vy*=0.4;});addEventListener('pointermove',e=>{if(!drag||!alive)return;const dx=e.clientX-px,dy=e.clientY-py;px=e.clientX;py=e.clientY;player.vx=dx*0.35;player.vy=dy*0.35;});addEventListener('keydown',e=>{keys[e.key]=true;if(!alive&&(e.key===' '||e.key==='Enter'))reset();});addEventListener('keyup',e=>keys[e.key]=false);function step(ts){const dt=Math.min(34,(ts-last)||16);last=ts;if(alive){difficulty=1+score/700;const spawnEvery=Math.max(180,720-difficulty*60);spawnT+=dt;while(spawnT>spawnEvery){spawnT-=spawnEvery;spawn();}const ax=((keys['ArrowRight']||keys['d']?1:0)-(keys['ArrowLeft']||keys['a']?1:0))*0.65;const ay=((keys['ArrowDown']||keys['s']?1:0)-(keys['ArrowUp']||keys['w']?1:0))*0.65;player.vx+=ax;player.vy+=ay;player.vx*=0.95;player.vy*=0.95;player.x+=player.vx*(dt/16);player.y+=player.vy*(dt/16);player.x=Math.max(player.r,Math.min(c.width-player.r,player.x));player.y=Math.max(player.r,Math.min(c.height-player.r,player.y));for(const st of stars){st.y+=st.v*(dt/16);if(st.y>c.height){st.y=0;st.x=Math.random()*c.width;}}obs.forEach(o=>{o.x+=o.vx*(dt/16);o.y+=o.vy*(dt/16);o.spin+=0.05+o.vx*0.002});obs=obs.filter(o=>o.x>-80&&o.x<c.width+80&&o.y>-80&&o.y<c.height+80);for(const o of obs){if(hit(o)){alive=false;record(Math.floor(score));state.textContent='Game over - tap to restart';break;}}score+=dt*0.012*(1+difficulty*0.15);scoreEl.textContent='Score: '+Math.floor(score);}draw();requestAnimationFrame(step)}requestAnimationFrame(step);function draw(){x.clearRect(0,0,c.width,c.height);x.fillStyle='rgba(255,255,255,.22)';for(const st of stars)x.fillRect(st.x,st.y,st.s,st.s);obs.forEach(o=>{x.save();x.translate(o.x,o.y);x.rotate(o.spin);x.font=o.s+'px serif';x.fillText(giraffe,-o.s*0.35,o.s*0.3);x.restore();});const angle=Math.atan2(player.vy,player.vx)||0;x.save();x.translate(player.x,player.y);x.rotate(angle);x.beginPath();x.arc(0,0,player.r,0,Math.PI*2);x.clip();x.drawImage(sava,-player.r,-player.r,player.r*2,player.r*2);x.restore();x.strokeStyle='#fff';x.lineWidth=2;x.beginPath();x.arc(player.x,player.y,player.r,0,Math.PI*2);x.stroke();}</script></body></html>
