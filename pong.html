<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Sava Pong</title><style>body{margin:0;background:#06101d;color:#fff;font-family:system-ui;touch-action:none}.top{display:flex;justify-content:space-between;padding:10px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}canvas{display:block;margin:0 auto;border:2px solid #fff;border-radius:12px;background:#101a33;max-width:96vw}.controls{display:flex;justify-content:center;gap:8px;margin:8px}.controls button{padding:10px 14px;border:0;border-radius:8px;background:#1f2a55;color:#fff;font-weight:900}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><div id='hud'>First to 7</div></div><canvas id='c' width='800' height='450'></canvas><div class='controls'><button id='up'>UP</button><button id='down'>DOWN</button></div><script>const KEY='sava_arcade_v1';function db(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return {}}}function getPlayer(){const d=db();return d.player||'Player'}async function record(score){try{await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'pong',name:getPlayer(),score:+score})});}catch{}}const c=document.getElementById('c'),x=c.getContext('2d',{alpha:false});let lp=180,rp=180,bx=400,by=225,bvx=320,bvy=120,ls=0,rs=0;let w=false,s=false,last=0;function reset(d=1){bx=400;by=225;bvx=320*d;bvy=(Math.random()*220-110)||120;}function end(){record(ls);document.getElementById('hud').textContent=(ls>rs?'You':'CPU')+' wins! refresh to replay';}up.onpointerdown=()=>w=true;up.onpointerup=()=>w=false;up.onpointercancel=()=>w=false;down.onpointerdown=()=>s=true;down.onpointerup=()=>s=false;down.onpointercancel=()=>s=false;addEventListener('keydown',e=>{if(e.key==='w'||e.key==='ArrowUp')w=true;if(e.key==='s'||e.key==='ArrowDown')s=true});addEventListener('keyup',e=>{if(e.key==='w'||e.key==='ArrowUp')w=false;if(e.key==='s'||e.key==='ArrowDown')s=false});function tick(ts){if(!last)last=ts;const dt=Math.min(34,ts-last)/1000;last=ts;if(ls<7&&rs<7){const ps=420,ai=280;if(w)lp-=ps*dt;if(s)lp+=ps*dt;lp=Math.max(0,Math.min(360,lp));if(by<rp+45)rp-=ai*dt;else rp+=ai*dt;rp=Math.max(0,Math.min(360,rp));bx+=bvx*dt;by+=bvy*dt;if(by<8&&bvy<0||by>442&&bvy>0)bvy*=-1;if(bx<35&&by>lp&&by<lp+90){bvx=Math.abs(bvx)+18;bvy+=(by-(lp+45))*2.2;}if(bx>765&&by>rp&&by<rp+90){bvx=-(Math.abs(bvx)+18);bvy+=(by-(rp+45))*2.2;}if(bx<0){rs++;reset(1)}if(bx>800){ls++;reset(-1)}if(ls>=7||rs>=7)end();}draw();requestAnimationFrame(tick)}function draw(){x.fillStyle='#101a33';x.fillRect(0,0,800,450);x.fillStyle='#fff';x.fillRect(20,lp,12,90);x.fillRect(768,rp,12,90);x.beginPath();x.arc(bx,by,8,0,Math.PI*2);x.fill();x.font='bold 36px system-ui';x.fillText(ls,350,45);x.fillText(rs,430,45);}requestAnimationFrame(tick);</script></body></html>
