<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Sava Pong</title><style>body{margin:0;background:#06101d;color:#fff;font-family:system-ui;touch-action:none}*{user-select:none;-webkit-user-select:none}.top{display:flex;justify-content:space-between;padding:10px;align-items:center;gap:8px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}.action{border:0;background:#1f2a55;color:#fff;border-radius:8px;padding:8px 10px;font-weight:800}canvas{display:block;margin:0 auto;border:2px solid #fff;border-radius:12px;background:#101a33;max-width:96vw}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><a class='btn' href='./leaderboard.html?game=pong'>Leaderboard</a><div id='hud'>First to 7</div><button id='pause' class='action'>Pause</button></div><canvas id='c' width='800' height='450'></canvas><script type='module' src='./instant.js'></script><script>const getPlayer=()=>localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'Player';async function record(score){try{if(window.InstantSync) await window.InstantSync.submitScore('pong',getPlayer(),+score);}catch{} try{await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'pong',name:getPlayer(),score:+score})});}catch{}}const c=document.getElementById('c'),x=c.getContext('2d',{alpha:false});let lp,rp,bx,by,bvx,bvy,ls,rs,last=0,paused=false,targetY=225;function resetBall(d=1){bx=400;by=225;bvx=320*d;bvy=(Math.random()*220-110)||120;}function resetGame(){lp=180;rp=180;ls=0;rs=0;paused=false;resetBall(Math.random()>.5?1:-1);document.getElementById('hud').textContent='First to 7';}function end(){record(ls);document.getElementById('hud').textContent=(ls>rs?'You':'CPU')+' wins!';paused=true}c.addEventListener('pointerdown',e=>{targetY=e.offsetY-45},{passive:true});c.addEventListener('pointermove',e=>{targetY=e.offsetY-45},{passive:true});addEventListener('keydown',e=>{if(e.key==='ArrowUp')targetY-=24;if(e.key==='ArrowDown')targetY+=24;if(e.key==='p'||e.key==='P'){paused=!paused;}});document.getElementById('pause').onclick=()=>paused=!paused;function tick(ts){if(!last)last=ts;const dt=Math.min(34,ts-last)/1000;last=ts;if(!paused&&ls<7&&rs<7){const ai=300;lp += (Math.max(0,Math.min(360,targetY))-lp)*Math.min(1,dt*20);rp += ((by-(rp+45))*0.06)*Math.min(1,dt*60);rp=Math.max(0,Math.min(360,rp));bx+=bvx*dt;by+=bvy*dt;if((by<8&&bvy<0)||(by>442&&bvy>0))bvy*=-1;if(bx<35&&by>lp&&by<lp+90){bvx=Math.abs(bvx)+20;bvy+=(by-(lp+45))*2.3;}if(bx>765&&by>rp&&by<rp+90){bvx=-(Math.abs(bvx)+20);bvy+=(by-(rp+45))*2.3;}if(bx<0){rs++;resetBall(1)}if(bx>800){ls++;resetBall(-1)}if(ls>=7||rs>=7)end();}draw();requestAnimationFrame(tick)}function draw(){x.fillStyle='#101a33';x.fillRect(0,0,800,450);x.fillStyle='#fff';x.fillRect(20,lp,12,90);x.fillRect(768,rp,12,90);x.beginPath();x.arc(bx,by,8,0,Math.PI*2);x.fill();x.font='bold 36px system-ui';x.fillText(ls,350,45);x.fillText(rs,430,45);if(paused&&ls<7&&rs<7){x.fillStyle='rgba(0,0,0,.45)';x.fillRect(0,0,800,450);x.fillStyle='#fff';x.fillText('PAUSED',330,230)}}resetGame();requestAnimationFrame(tick);</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
