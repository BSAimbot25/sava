<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Sava Pong</title><style>body{margin:0;background:#06101d;color:#fff;font-family:system-ui}.top{display:flex;justify-content:space-between;padding:10px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}canvas{display:block;margin:0 auto;border:2px solid #fff;border-radius:12px;background:#101a33;max-width:96vw}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><div>W/S move · first to 7</div></div><canvas id='c' width='800' height='450'></canvas><script>const c=document.getElementById('c'),x=c.getContext('2d');let lp=180,rp=180,bs=8,bx=400,by=225,bvx=4,bvy=2,ls=0,rs=0;let w=false,s=false;addEventListener('keydown',e=>{if(e.key==='w')w=true;if(e.key==='s')s=true});addEventListener('keyup',e=>{if(e.key==='w')w=false;if(e.key==='s')s=false});function reset(d=1){bx=400;by=225;bvx=4*d;bvy=(Math.random()*4-2)||2;}function tick(){if(w)lp-=6;if(s)lp+=6;lp=Math.max(0,Math.min(360,lp));if(by<rp+45)rp-=4;else rp+=4;rp=Math.max(0,Math.min(360,rp));bx+=bvx;by+=bvy;if(by<8||by>442)bvy*=-1;if(bx<35&&by>lp&&by<lp+90){bvx=Math.abs(bvx)+0.3}if(bx>765&&by>rp&&by<rp+90){bvx=-(Math.abs(bvx)+0.3)}if(bx<0){rs++;reset(1)}if(bx>800){ls++;reset(-1)}draw();requestAnimationFrame(tick)}function draw(){x.fillStyle='#101a33';x.fillRect(0,0,800,450);x.fillStyle='#fff';x.fillRect(20,lp,12,90);x.fillRect(768,rp,12,90);x.beginPath();x.arc(bx,by,8,0,Math.PI*2);x.fill();x.font='bold 36px system-ui';x.fillText(ls,350,45);x.fillText(rs,430,45);if(ls>=7||rs>=7){x.font='bold 28px system-ui';x.fillText((ls>rs?'You':'CPU')+' wins! Refresh to replay',220,230);return;} }tick();</script></body></html>
