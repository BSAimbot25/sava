<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Suggestions</title><style>body{margin:0;background:#0b1020;color:#fff;font-family:system-ui}.wrap{width:min(900px,calc(100% - 18px));margin:14px auto}.top{display:flex;justify-content:space-between;align-items:center}.btn{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800}.card{margin-top:10px;background:#171f47;border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:12px}input,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ffffff33;background:#0d1434;color:#fff}textarea{min-height:100px}.item{padding:8px;border-bottom:1px solid #ffffff18}.muted{opacity:.8}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='./index.html'>← Home</a><h2 style='margin:0'>Suggestions</h2></div><section class='card'><label>Your name</label><input id='name' placeholder='Player'><label style='display:block;margin-top:8px'>Suggestion</label><textarea id='text' placeholder='Write your idea...'></textarea><button id='send' class='btn' style='margin-top:8px'>Submit</button><div class='muted' id='status'></div></section><section class='card'><h3 style='margin:0 0 8px'>Latest Suggestions</h3><div id='list'></div></section></div><script type='module' src='./instant.js'></script><script>const KEY='sava_suggestions_v1';function get(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}}function set(v){localStorage.setItem(KEY,JSON.stringify(v))}function render(){const rows=get().sort((a,b)=>b.t-a.t).slice(0,50);list.innerHTML=rows.length?rows.map(r=>`<div class='item'><b>${(r.n||'Player').replace(/</g,'&lt;')}</b><div>${(r.s||'').replace(/</g,'&lt;')}</div></div>`).join(''):'<div class="item">No suggestions yet</div>';}send.onclick=async()=>{const n=(name.value||localStorage.getItem('sava_current_user_v1')||'Player').trim();const s=(text.value||'').trim();if(!s)return;const rows=get();rows.push({n,s,t:Date.now()});set(rows);text.value='';render();status.textContent='Saved.';if(window.InstantSync){try{const cloud=await window.InstantSync.loadProgress('suggestions');const c=Array.isArray(cloud)?cloud:[];c.push({n,s,t:Date.now()});await window.InstantSync.saveProgress('suggestions',c.slice(-300));status.textContent='Saved + cloud synced.';}catch{}}};(async()=>{if(window.InstantSync){try{const cloud=await window.InstantSync.loadProgress('suggestions');if(Array.isArray(cloud)&&cloud.length){set(cloud);}}catch{}}render();})();</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
