<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sava Games Hub</title>
  <style>
    body{margin:0;font-family:system-ui;background:#090b1a;color:#fff}
    .wrap{width:min(1100px,calc(100% - 20px));margin:18px auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
    h1{margin:0;color:#ffe700}
    .back{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800}
    .panel{background:#151a33;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:12px;margin-top:12px}
    .grid{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .card{background:#151a33;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:14px}
    .go{display:inline-block;background:#00ffc8;color:#062d24;text-decoration:none;padding:9px 12px;border-radius:10px;font-weight:800}
    ol{margin:8px 0 0 18px}
    .muted{opacity:.8}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>🎮 SAVA GAMES HUB</h1>
      <a class="back" href="./index.html">Back</a>
    </div>

    <section class="panel">
      <div><strong>Player:</strong> <span id="playerName"></span> <button id="changeName">Change</button></div>
      <div class="muted">Global leaderboard is now shared across players.</div>
      <div style="margin-top:8px"><strong>Global Top (all games)</strong><ol id="leader"></ol></div>
    </section>

    <section class="grid">
      <article class="card"><h3>Sava Tetris</h3><a class="go" href="./tetris.html">Play</a></article>
      <article class="card"><h3>Space Sava Dodge</h3><a class="go" href="./space-dodge.html">Play</a></article>
      <article class="card"><h3>Sava Snake</h3><a class="go" href="./snake.html">Play</a></article>
      <article class="card"><h3>Sava Pong</h3><a class="go" href="./pong.html">Play</a></article>
      <article class="card"><h3>Face Clicker</h3><a class="go" href="./face-clicker.html">Play</a></article>
      <article class="card"><h3>Face Memory</h3><a class="go" href="./face-memory.html">Play</a></article>
    </section>
  </div>

<script>
const KEY='sava_arcade_v1';
function db(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return {}}}
function save(v){localStorage.setItem(KEY,JSON.stringify(v));}
function ensure(){const d=db(); if(!d.player){let n=prompt('Enter your player name for Sava Games leaderboard:','Player'); d.player=(n&&n.trim())?n.trim():'Player'; save(d);} return d;}
function gameLabel(g){return ({tetris:'Tetris',dodge:'Dodge',snake:'Snake',pong:'Pong',clicker:'Clicker',memory:'Memory'})[g]||g}
async function render(){const d=ensure(); document.getElementById('playerName').textContent=d.player;
  const el=document.getElementById('leader'); el.innerHTML='<li>Loading...</li>';
  try{
    const r=await fetch('/api/leaderboard');
    const j=await r.json();
    const all=[];
    for(const [g,rows] of Object.entries(j.boards||{})){ for(const row of rows){ all.push({name:row.name,score:row.score,game:g}); } }
    all.sort((a,b)=>b.score-a.score);
    el.innerHTML=(all.slice(0,20).map(r=>`<li><strong>${r.name}</strong> — ${gameLabel(r.game)}: ${Math.floor(r.score)}</li>`).join('')||'<li>No records yet</li>');
  }catch{
    el.innerHTML='<li>Leaderboard temporarily unavailable</li>';
  }
}
document.getElementById('changeName').onclick=()=>{const d=db(); const n=prompt('New player name:',d.player||'Player'); if(n&&n.trim()){d.player=n.trim(); save(d); render();}};
render();
</script>
<script type="module">import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script>
</body>
</html>
