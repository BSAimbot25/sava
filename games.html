<!doctype html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'/><title>Sava Games Hub</title><style>body{margin:0;font-family:system-ui;background:#090b1a;color:#fff}*{user-select:none;-webkit-user-select:none}.wrap{width:min(1120px,calc(100% - 20px));margin:18px auto}.top{display:flex;justify-content:space-between;align-items:center;gap:8px}h1{margin:0;color:#ffe700}.back{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800}.panel{background:#151a33;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:12px;margin-top:12px}.grid{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.card{background:#151a33;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:14px}.go{display:inline-block;background:#00ffc8;color:#062d24;text-decoration:none;padding:9px 12px;border-radius:10px;font-weight:800;margin-right:6px}.lb{display:inline-block;background:#ffffff16;color:#fff;text-decoration:none;padding:9px 12px;border-radius:10px;font-weight:800}.muted{opacity:.8}.hot{border-color:#ffca52;box-shadow:0 0 18px rgba(255,202,82,.25)}</style></head><body><div class='wrap'><div class='top'><h1>🎮 SAVA GAMES HUB</h1><a class='back' href='./index.html'>Back</a></div><section class='panel'><div><strong>Account:</strong> <span id='playerName'>Player</span></div><div class='muted'>Popular now is auto-ranked from live leaderboard activity. Snus games stay featured. <span id='cloudStatus'>Cloud: checking...</span></div></section><section class='panel'><h2 style='margin:0'>🔥 Popular Now</h2><div class='grid' id='popularGrid'></div></section><section class='panel'><h2 style='margin:0'>All Games</h2><div class='grid' id='allGrid'></div></section></div><script type='module' src='./instant.js'></script><script>const n=localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'Player';document.getElementById('playerName').textContent=n;const games=[{k:'snus',name:'Snus Clicker',play:'./snus-clicker.html'},{k:'dodge',name:'Space Sava Dodge',play:'./space-dodge.html'},{k:'tetris',name:'Sava Tetris',play:'./tetris.html'},{k:'breakout',name:'Snus Breakout',play:'./snus-breakout.html'},{k:'snake',name:'Sava Snake',play:'./snake.html'},{k:'pong',name:'Sava Pong',play:'./pong.html'},{k:'clicker',name:'Face Clicker',play:'./face-clicker.html'},{k:'memory',name:'Face Memory',play:'./face-memory.html'},{k:'flappy',name:'Flappy Snus',play:'./flappy-snus.html'},{k:'snus2048',name:'Snus 2048',play:'./snus-2048.html'}];
function card(g,hot=false){return `<article class='card ${hot?'hot':''}'><h3>${g.name}</h3><a class='go' href='${g.play}'>Play</a><a class='lb' href='./leaderboard.html?game=${g.k}'>Leaderboard</a></article>`;}
async function getSync(){if(window.InstantSync) return window.InstantSync; try{await import('./instant.js');}catch{} return window.InstantSync||null;}
async function render(){const allGrid=document.getElementById('allGrid');allGrid.innerHTML=games.map(g=>card(g,false)).join('');const pop=document.getElementById('popularGrid');pop.innerHTML='<div class="muted">Ranking popular games...</div>';const sync=await getSync();if(sync){const s=await sync.cloudStatus();document.getElementById('cloudStatus').textContent='Cloud: '+s.text;}else document.getElementById('cloudStatus').textContent='Cloud: Local fallback';let boards={};try{if(sync){boards=await sync.fetchBoards(games.map(g=>g.k));}else{const r=await fetch('/api/leaderboard');const j=await r.json();boards=j.boards||{};}}catch{}
const scored=games.map(g=>{const rows=boards[g.k]||[];const best=rows[0]?.score||0;const density=rows.length;let trend=Number(best||0)+density*250; if(g.k==='snus'||g.k==='breakout'||g.k==='snus2048'||g.k==='flappy') trend*=1.15; return {...g,trend};}).sort((a,b)=>b.trend-a.trend);
const top=scored.slice(0,4);pop.innerHTML=top.map(g=>card(g,true)).join('');}
render();</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
