<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Sava Inbox</title><style>body{margin:0;background:#0a1020;color:#fff;font-family:system-ui}.wrap{width:min(1100px,calc(100% - 18px));margin:14px auto}.top{display:flex;justify-content:space-between;align-items:center}.btn{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800}.grid{display:grid;grid-template-columns:320px 1fr;gap:10px;margin-top:10px}.card{background:#171f47;border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:10px}.conv{padding:8px;border-bottom:1px solid #ffffff18;cursor:pointer}.conv b{display:block}.msgs{height:520px;overflow:auto}.m{margin:8px 0;padding:8px;border-radius:10px;max-width:80%}.me{background:#00ffc833;color:#05271f;margin-left:auto}.them{background:#ffffff16}.row{display:flex;gap:8px;margin-top:8px}input{flex:1;padding:10px;border-radius:10px;border:1px solid #ffffff33;background:#0d1434;color:#fff}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='./account.html'>← Account</a><h2 style='margin:0'>Inbox</h2></div><div class='grid'><section class='card'><h3 style='margin:0 0 8px'>Conversations</h3><div id='convs'></div></section><section class='card'><h3 id='chatTitle' style='margin:0 0 8px'>Select a conversation</h3><div id='msgs' class='msgs'></div><div class='row'><input id='text' placeholder='Type message...'><button id='send' class='btn'>Send</button></div></section></div></div><script type='module' src='./instant.js'></script><script>let current='';function esc(s){return String(s||'').replace(/</g,'&lt;')}async function loadConvs(){if(!window.InstantSync)return;const c=await window.InstantSync.fetchConversations();convs.innerHTML=c.length?c.map(v=>`<div class='conv' data-u='${v.other}'><b>${v.other}</b><small>${esc(v.lastText||'')}</small></div>`).join(''):'<div class="conv">No messages yet</div>';document.querySelectorAll('.conv[data-u]').forEach(el=>el.onclick=()=>openChat(el.dataset.u));}async function openChat(u){current=u;chatTitle.textContent='Chat with '+u;const rows=await window.InstantSync.fetchMessages(u);msgs.innerHTML=rows.map(r=>`<div class='m ${((r.from||'').toLowerCase()===(localStorage.getItem('sava_current_user_v1')||'').toLowerCase())?'me':'them'}'>${esc(r.text)}</div>`).join('');msgs.scrollTop=msgs.scrollHeight;}send.onclick=async()=>{const t=text.value.trim();if(!t||!current)return;await window.InstantSync.sendMessage(current,t);text.value='';await openChat(current);await loadConvs();};(async()=>{if(!window.InstantSync){try{await import('./instant.js')}catch{}}await loadConvs();const q=new URLSearchParams(location.search).get('u');if(q){current=q;await openChat(q);}})();</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
