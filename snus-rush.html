<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Snus Rush</title><style>body{margin:0;background:#071022;color:#fff;font-family:system-ui;touch-action:none}*{user-select:none;-webkit-user-select:none}.top{display:flex;justify-content:space-between;align-items:center;padding:10px;gap:8px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}.hud{font-weight:800}canvas{display:block;margin:0 auto;background:#111a36;border:2px solid #fff;border-radius:12px;max-width:96vw}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><a class='btn' href='./leaderboard.html?game=rush'>Leaderboard</a><div class='hud' id='hud'>Score: 0</div><button id='restart' class='btn'>Restart</button></div><canvas id='c' width='800' height='460'></canvas><script type='module' src='./instant.js'></script><script>const me=()=>localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'Player';async function record(score){try{if(window.InstantSync) await window.InstantSync.submitScore('rush',me(),score);}catch{} try{await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'rush',name:me(),score})});}catch{}}const cv=document.getElementById('c'),x=cv.getContext('2d');const img=new Image();img.src='./can.jpg';let p,obs,score,last=0,alive=true,spawn=0,targetY=230;function reset(){p={x:100,y:230,r:24};obs=[];score=0;alive=true;spawn=0;hud();}function hud(){document.getElementById('hud').textContent='Score: '+Math.floor(score);}function step(ts){if(!last)last=ts;const dt=Math.min(34,ts-last);last=ts;if(alive){p.y += (targetY-p.y)*0.14;spawn+=dt;if(spawn>560){spawn=0;obs.push({x:840,y:40+Math.random()*380,w:28+Math.random()*22,h:28+Math.random()*40});}for(const o of obs)o.x-=6*(dt/16);obs=obs.filter(o=>o.x>-60);for(const o of obs){if(Math.abs((o.x+o.w/2)-p.x)<(o.w/2+p.r)&&Math.abs((o.y+o.h/2)-p.y)<(o.h/2+p.r)){alive=false;record(Math.floor(score));}}score+=dt*0.02;hud();}draw();requestAnimationFrame(step)}function draw(){x.fillStyle='#111a36';x.fillRect(0,0,800,460);x.fillStyle='#00ffc8';for(const o of obs)x.fillRect(o.x,o.y,o.w,o.h);x.save();x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.clip();x.drawImage(img,p.x-p.r,p.y-p.r,p.r*2,p.r*2);x.restore();x.strokeStyle='#fff';x.lineWidth=2;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.stroke();if(!alive){x.fillStyle='rgba(0,0,0,.45)';x.fillRect(0,0,800,460);x.fillStyle='#fff';x.font='bold 38px system-ui';x.fillText('GAME OVER',285,230);}}cv.addEventListener('pointermove',e=>{const r=cv.getBoundingClientRect();targetY=(e.clientY-r.top)*(460/r.height);},{passive:true});cv.addEventListener('pointerdown',e=>{const r=cv.getBoundingClientRect();targetY=(e.clientY-r.top)*(460/r.height);},{passive:true});addEventListener('keydown',e=>{if(e.key==='ArrowUp')targetY-=26;if(e.key==='ArrowDown')targetY+=26;});document.getElementById('restart').onclick=reset;reset();requestAnimationFrame(step);</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
