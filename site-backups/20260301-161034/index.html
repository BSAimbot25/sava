<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>silkin</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #wrap {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        cursor: pointer;
      }
      img {
        max-width: 100vw;
        max-height: 100vh;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
      }
      #merch-btn, #blog-btn, #guestbook-btn, #games-btn {
        position: fixed;
        z-index: 20;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        text-decoration: none;
        font-family: "Arial Black", Impact, sans-serif;
        letter-spacing: 0.06em;
        font-size: 14px;
        color: #111;
        border: 2px solid #fff;
        border-radius: 14px;
        padding: 14px 10px;
      }

      .mobile-nav {
        display: none;
      }
      #merch-btn {
        right: 6px;
        top: 62%;
        transform: rotate(-3deg);
        background: linear-gradient(180deg, #fff200, #ff7a00);
        box-shadow: 0 0 18px rgba(255, 238, 0, 0.95);
        animation: blink 0.65s steps(2, end) infinite;
      }
      #blog-btn {
        right: 10px;
        top: 11%;
        transform: rotate(2deg);
        background: linear-gradient(180deg, #00ffef, #00a6ff);
        box-shadow: 0 0 24px rgba(0, 255, 239, 0.98), 0 0 36px rgba(0, 166, 255, 0.85);
        animation: blogBlink 0.5s steps(2, end) infinite;
      }
      #guestbook-btn {
        left: 6px;
        top: 31%;
        transform: rotate(-1deg);
        background: linear-gradient(180deg, #9dff00, #26ff7c);
        box-shadow: 0 0 22px rgba(157, 255, 0, 0.95);
        animation: blink 0.7s steps(2, end) infinite;
      }
      #games-btn {
        left: 10px;
        top: 70%;
        transform: rotate(3deg);
        background: linear-gradient(180deg, #ff4ef6, #8a2cff);
        box-shadow: 0 0 24px rgba(255, 78, 246, 0.95);
        animation: blogBlink 0.58s steps(2, end) infinite;
      }
      @keyframes blink {
        0%, 100% { filter: saturate(1.1) brightness(1); }
        50% { filter: saturate(2) brightness(1.4); }
      }
      @keyframes blogBlink {
        0%, 100% { filter: saturate(1.2) brightness(1); }
        50% { filter: saturate(2.2) brightness(1.65); }
      }

      @media (max-width: 760px) {
        #merch-btn, #blog-btn, #guestbook-btn, #games-btn {
          display: none;
        }

        .mobile-nav {
          position: fixed;
          left: 50%;
          bottom: 10px;
          transform: translateX(-50%);
          z-index: 30;
          display: flex;
          gap: 6px;
          width: calc(100% - 12px);
          max-width: 560px;
          justify-content: center;
          flex-wrap: wrap;
        }

        .mobile-nav a {
          text-decoration: none;
          border: 2px solid #fff;
          border-radius: 12px;
          padding: 8px 10px;
          font-family: "Arial Black", Impact, sans-serif;
          font-size: 11px;
          letter-spacing: .03em;
          color: #111;
          box-shadow: 0 0 14px rgba(255,255,255,.35);
        }

        .mobile-nav .m-blog { background: linear-gradient(180deg, #00ffef, #00a6ff); }
        .mobile-nav .m-merch { background: linear-gradient(180deg, #fff200, #ff7a00); }
        .mobile-nav .m-guest { background: linear-gradient(180deg, #9dff00, #26ff7c); }
        .mobile-nav .m-games { background: linear-gradient(180deg, #ff4ef6, #8a2cff); color: #fff; }
      }

    </style>
  </head>
  <body>
    <a id="blog-btn" href="./blog.html">SAVAS BLOG</a>
    <a id="merch-btn" href="./merch.html">MERCH STORE</a>
    <a id="guestbook-btn" href="./guestbook.html">GUESTBOOK</a>
    <a id="games-btn" href="./games.html">SAVA GAMES</a>

    <nav class="mobile-nav">
      <a class="m-blog" href="./blog.html">BLOG</a>
      <a class="m-merch" href="./merch.html">MERCH</a>
      <a class="m-guest" href="./guestbook.html">GUESTBOOK</a>
      <a class="m-games" href="./games.html">GAMES</a>
    </nav>
    <div id="wrap">
      <img id="photo" src="./1.jpg" alt="silkin image" />
    </div>
    <audio id="bg-audio" loop preload="auto" playsinline webkit-playsinline>
      <source src="./song.m4a" type="audio/mp4" />
    </audio>

    <script>
      const images = [
        './1.jpg','./2.jpg','./3.jpg','./4.jpg','./5.jpg','./6.jpg','./7.jpg','./8.jpg','./9.jpg','./10.jpg','./11.jpg','./12.jpg'
      ];
      let current = 0;
      let pool = [];
      const photo = document.getElementById('photo');
      const wrap = document.getElementById('wrap');
      const bgAudio = document.getElementById('bg-audio');

      // Preload all images for instant switching.
      images.forEach((src) => {
        const img = new Image();
        img.src = src;
      });

      function refillPool() {
        pool = images.map((_, idx) => idx).filter((idx) => idx !== current);
      }

      function next() {
        if (pool.length === 0) refillPool();
        const pick = Math.floor(Math.random() * pool.length);
        current = pool.splice(pick, 1)[0];
        photo.src = images[current];
      }

      let resumeTimer = null;
      let audioUnlocked = false;

      function tryPlayAudio() {
        bgAudio.loop = true;
        bgAudio.muted = false;
        bgAudio.volume = 1;
        bgAudio.play().then(() => {
          audioUnlocked = true;
        }).catch(() => {
          // iOS may block until a user gesture.
        });
      }

      function startAutoResume() {
        if (resumeTimer) clearInterval(resumeTimer);
        resumeTimer = setInterval(() => {
          if (audioUnlocked && !document.hidden && bgAudio.paused) {
            tryPlayAudio();
          }
        }, 1200);
      }

      startAutoResume();

      document.addEventListener('visibilitychange', () => {
        if (audioUnlocked && !document.hidden) tryPlayAudio();
      });
      window.addEventListener('pageshow', () => {
        if (audioUnlocked) tryPlayAudio();
      });
      window.addEventListener('focus', () => {
        if (audioUnlocked) tryPlayAudio();
      });
      bgAudio.addEventListener('ended', () => {
        if (audioUnlocked) tryPlayAudio();
      });
      bgAudio.addEventListener('pause', () => {
        if (audioUnlocked && !document.hidden) setTimeout(tryPlayAudio, 250);
      });

      // Unlock and start audio only after first user interaction.
      const unlockAudio = () => tryPlayAudio();
      ['touchstart', 'pointerdown', 'click', 'keydown'].forEach((ev) => {
        window.addEventListener(ev, unlockAudio, { passive: true });
      });

      // Faster, more reliable tap/click handling on mobile and desktop.
      wrap.addEventListener('pointerup', next, { passive: true });
      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') next();
      });
    </script>
    <script type="module">
    import { inject } from "https://esm.sh/@vercel/analytics";
    inject();
  </script>
</body>
</html>
