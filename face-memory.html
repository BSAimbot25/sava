<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Face Memory</title><style>body{margin:0;background:#0a1020;color:#fff;font-family:system-ui}.top{display:flex;justify-content:space-between;padding:10px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}.grid{width:min(800px,calc(100% - 20px));margin:10px auto;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{aspect-ratio:1/1;background:#1a2450;border-radius:12px;display:grid;place-items:center;cursor:pointer;overflow:hidden}.card img{width:100%;height:100%;object-fit:cover}.back{font-size:2rem;color:#9fb4ff}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><div id='hud'>Pairs: 0/8</div></div><div class='grid' id='g'></div><script>const imgs=[1,2,3,4,5,6,7,8].flatMap(n=>[`./${n}.jpg`,`./${n}.jpg`]).sort(()=>Math.random()-.5);const g=document.getElementById('g'),hud=document.getElementById('hud');let open=[],lock=false,found=0;imgs.forEach((src,idx)=>{const c=document.createElement('button');c.className='card';c.dataset.src=src;c.dataset.i=idx;c.innerHTML='<span class="back">?</span>';c.onclick=()=>flip(c);g.appendChild(c);});function reveal(c){c.innerHTML=`<img src='${c.dataset.src}' alt='face'>`;}function hide(c){c.innerHTML='<span class="back">?</span>';}function flip(c){if(lock||open.includes(c)||c.dataset.done==='1')return;reveal(c);open.push(c);if(open.length===2){const[a,b]=open;if(a.dataset.src===b.dataset.src){a.dataset.done=b.dataset.done='1';found++;hud.textContent=`Pairs: ${found}/8`;open=[];if(found===8)setTimeout(()=>alert('You cleared Face Memory!'),120);}else{lock=true;setTimeout(()=>{hide(a);hide(b);open=[];lock=false;},700);}}}</script></body></html>
