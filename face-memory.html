<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Face Memory</title><style>body{margin:0;background:#0a1020;color:#fff;font-family:system-ui}.top{display:flex;justify-content:space-between;padding:10px;gap:8px;align-items:center}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}.action{border:0;background:#1f2a55;color:#fff;border-radius:8px;padding:8px 10px;font-weight:800}.grid{width:min(800px,calc(100% - 20px));margin:10px auto;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{aspect-ratio:1/1;background:#1a2450;border-radius:12px;display:grid;place-items:center;cursor:pointer;overflow:hidden;border:0}.card img{width:100%;height:100%;object-fit:cover}.back{font-size:2rem;color:#9fb4ff}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><div id='hud'>Pairs: 0/8 • Moves: 0</div><button id='restart' class='action'>Restart</button></div><div class='grid' id='g'></div><script type='module' src='./instant.js'></script><script>const KEY='sava_arcade_v1';function db(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return {}}}function getPlayer(){const d=db();return d.player||'Player'}async function record(score){try{if(window.InstantSync) await window.InstantSync.submitScore('memory',getPlayer(),+score);}catch{} try{await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'memory',name:getPlayer(),score:+score})});}catch{}}const g=document.getElementById('g'),hud=document.getElementById('hud');let deck=[],open=[],lock=false,found=0,moves=0,start=Date.now();
function mkDeck(){return [1,2,3,4,5,6,7,8].flatMap(n=>[`./${n}.jpg`,`./${n}.jpg`]).sort(()=>Math.random()-.5)}
function hudUp(){hud.textContent=`Pairs: ${found}/8 • Moves: ${moves}`}
function reveal(c){c.innerHTML=`<img src='${c.dataset.src}' alt='face'>`}function hide(c){c.innerHTML='<span class="back">?</span>'}
function done(){const sec=(Date.now()-start)/1000;const score=Math.max(1,Math.floor(5200-(moves*55+sec*22)));record(score);setTimeout(()=>{if(confirm('You cleared Face Memory! Score: '+score+'\nPlay again?')) init();},120)}
function flip(c){if(lock||open.includes(c)||c.dataset.done==='1')return;reveal(c);open.push(c);if(open.length===2){moves++;const[a,b]=open;if(a.dataset.src===b.dataset.src){a.dataset.done=b.dataset.done='1';found++;open=[];hudUp();if(found===8)done()}else{lock=true;setTimeout(()=>{hide(a);hide(b);open=[];lock=false;hudUp();},550)}}}
function init(){deck=mkDeck();open=[];lock=false;found=0;moves=0;start=Date.now();g.innerHTML='';deck.forEach((src,idx)=>{const c=document.createElement('button');c.className='card';c.dataset.src=src;c.dataset.i=idx;c.innerHTML='<span class="back">?</span>';c.onclick=()=>flip(c);g.appendChild(c)});hudUp()}
document.getElementById('restart').onclick=init;init();</script></body></html>
