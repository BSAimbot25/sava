<!doctype html>
<html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Sweatshirt</title>
<style>body{margin:0;background:#0b0b12;color:#fff;font-family:system-ui}.wrap{width:min(1050px,calc(100% - 20px));margin:14px auto;display:grid;grid-template-columns:1.2fr .9fr;gap:12px}.panel{background:#171b33;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:10px}.cover{width:100%;border-radius:10px;border:1px solid rgba(255,255,255,.2);cursor:pointer}.thumbs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}.thumbs img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px;cursor:pointer}.back{display:inline-block;margin:10px;background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800}.size{display:inline-block;margin:3px;padding:6px 10px;background:rgba(255,255,255,.1);border-radius:8px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;place-items:center;padding:12px}.modal img{max-width:95vw;max-height:82vh}.nav{display:flex;gap:8px;margin-top:8px}.nav button{padding:8px 10px;border:0;border-radius:8px;font-weight:800}</style></head><body>
<a class="back" href="./merch.html">← Merch</a>
<div class="wrap"><section class="panel"><img id="cover" class="cover" src="./merch-assets/sweatshirt-10.jpg"/><div id="thumbs" class="thumbs"></div></section><section class="panel"><h1>Sava x Giraffe Sweatshirt</h1><h2>€49</h2><p style="opacity:.75">Coming soon</p><div><span class="size">S</span><span class="size">M</span><span class="size">L</span><span class="size">XL</span><span class="size">2XL</span></div></section></div>
<div class="modal" id="m"><div><img id="v"/><div class="nav"><button id="p">◀ Prev</button><button id="n">Next ▶</button><button id="c">Close</button></div></div></div>
<script>const images=['./merch-assets/sweatshirt-10.jpg','./merch-assets/sweatshirt-9.jpg','./merch-assets/sweatshirt-8.jpg','./merch-assets/sweatshirt-7.jpg','./merch-assets/sweatshirt-6.jpg','./merch-assets/sweatshirt-5.jpg','./merch-assets/sweatshirt-4.jpg','./merch-assets/sweatshirt-3.jpg','./merch-assets/sweatshirt-2.jpg','./merch-assets/sweatshirt-1.jpg'];let i=0;const t=document.getElementById('thumbs'),m=document.getElementById('m'),v=document.getElementById('v');images.forEach((s,k)=>{const im=document.createElement('img');im.src=s;im.onclick=()=>open(k);t.appendChild(im)});function open(k){i=k;v.src=images[i];m.style.display='grid'};function nav(d){i=(i+d+images.length)%images.length;v.src=images[i]}document.getElementById('cover').onclick=()=>open(0);document.getElementById('p').onclick=()=>nav(-1);document.getElementById('n').onclick=()=>nav(1);document.getElementById('c').onclick=()=>m.style.display='none';m.onclick=e=>{if(e.target===m)m.style.display='none'};</script>
<script type="module">import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script>
</body></html>
