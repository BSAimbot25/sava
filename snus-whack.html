<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Whack-a-Snus</title><style>body{margin:0;background:#0a1020;color:#fff;font-family:system-ui;touch-action:none}*{user-select:none;-webkit-user-select:none}.top{display:flex;justify-content:space-between;align-items:center;padding:10px;gap:8px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}.grid{width:min(760px,calc(100% - 16px));margin:8px auto;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.hole{aspect-ratio:1/1;background:#1a2450;border:2px solid #ffffff35;border-radius:12px;display:grid;place-items:center;overflow:hidden}.hole img{width:82%;height:82%;object-fit:cover;border-radius:50%;display:none;cursor:pointer}.hole.up img{display:block}.hud{font-weight:800}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><a class='btn' href='./leaderboard.html?game=whack'>Leaderboard</a><div class='hud' id='hud'>Score: 0 | Time: 30</div><button id='restart' class='btn'>Restart</button></div><div class='grid' id='g'></div><script type='module' src='./instant.js'></script><script>const me=()=>localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'Player';async function record(score){try{if(window.InstantSync) await window.InstantSync.submitScore('whack',me(),score);}catch{} try{await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'whack',name:me(),score})});}catch{}}const g=document.getElementById('g'),hud=document.getElementById('hud');let holes=[],score=0,time=30,live=true,sp=0,tm=0;for(let i=0;i<9;i++){const d=document.createElement('div');d.className='hole';d.innerHTML="<img src='./can.jpg' alt='snus'>";const img=d.querySelector('img');img.onpointerdown=()=>{if(!d.classList.contains('up')||!live)return;score+=10;d.classList.remove('up');render();};holes.push(d);g.appendChild(d);}function render(){hud.textContent=`Score: ${score} | Time: ${time}`;}function spawn(){if(!live)return;holes.forEach(h=>h.classList.remove('up'));holes[(Math.random()*holes.length)|0].classList.add('up');}function start(){live=true;score=0;time=30;render();clearInterval(sp);clearInterval(tm);sp=setInterval(spawn,420);tm=setInterval(()=>{time--;render();if(time<=0){live=false;clearInterval(sp);clearInterval(tm);holes.forEach(h=>h.classList.remove('up'));record(score);}},1000);}document.getElementById('restart').onclick=start;start();</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
