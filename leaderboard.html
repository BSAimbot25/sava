<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Game Leaderboard</title><style>body{margin:0;background:#0a1020;color:#fff;font-family:system-ui}.wrap{width:min(900px,calc(100% - 20px));margin:14px auto}.top{display:flex;justify-content:space-between;align-items:center;gap:8px}.btn{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800}.card{margin-top:10px;background:#171f47;border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:12px}ol{margin:8px 0 0 20px}.muted{opacity:.8}.pill{display:inline-block;background:#101833;border:1px solid #2b3762;border-radius:999px;padding:6px 10px;margin-right:8px}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='./games.html'>← Games</a><h2 id='title' style='margin:0'>Leaderboard</h2></div><div class='card'><div id='status' class='muted'>Loading...</div><p><span class='pill' id='myRank'>My Rank: -</span><span class='pill' id='myBest'>My Best: -</span></p><ol id='rows'></ol></div></div><script type='module' src='./instant.js'></script><script>const map={tetris:'Tetris',dodge:'Space Dodge',snake:'Snake',pong:'Pong',clicker:'Face Clicker',memory:'Face Memory',snus:'Snus Clicker',breakout:'Snus Breakout'};const game=(new URLSearchParams(location.search).get('game')||'tetris');const me=(localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'Player');title.textContent=(map[game]||game)+' Leaderboard';async function getSync(){if(window.InstantSync) return window.InstantSync; try{await import('./instant.js');}catch{} return window.InstantSync||null;}async function run(){try{let all=[];const sync=await getSync();if(sync){all=await sync.fetchGameScores(game);status.textContent='Cloud leaderboard';}else{const r=await fetch('/api/leaderboard');const j=await r.json();all=((j.boards&&j.boards[game])||[]);status.textContent='API leaderboard';}
all.sort((a,b)=>Number(b.score||0)-Number(a.score||0));
const mine=all.filter(r=>(r.name||'').toLowerCase()===me.toLowerCase());const best=mine.length?Math.floor(Math.max(...mine.map(m=>Number(m.score||0)))):0;myBest.textContent='My Best: '+(best?best.toLocaleString():'-');const rank=all.findIndex(r=>(r.name||'').toLowerCase()===me.toLowerCase())+1;myRank.textContent='My Rank: '+(rank||'-');rowsEl(all.slice(0,50));}catch{status.textContent='Leaderboard unavailable'}}function rowsEl(rows){const el=document.getElementById('rows');el.innerHTML=rows.length?rows.map((r,i)=>`<li><strong>${r.name}</strong> — ${Math.floor(r.score)} ${i<3?'🏆':''}</li>`).join(''):'<li>No scores yet</li>';}run();</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
