<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Game Leaderboard</title><style>body{margin:0;background:#0a1020;color:#fff;font-family:system-ui}.wrap{width:min(900px,calc(100% - 20px));margin:14px auto}.top{display:flex;justify-content:space-between;align-items:center}.btn{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800}.card{margin-top:10px;background:#171f47;border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:12px}ol{margin:8px 0 0 20px}.muted{opacity:.8}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='./games.html'>← Games</a><h2 id='title' style='margin:0'>Leaderboard</h2></div><div class='card'><div id='status' class='muted'>Loading...</div><ol id='rows'></ol></div></div><script type='module' src='./instant.js'></script><script>const map={tetris:'Tetris',dodge:'Space Dodge',snake:'Snake',pong:'Pong',clicker:'Face Clicker',memory:'Face Memory',snus:'Snus Clicker'};const game=(new URLSearchParams(location.search).get('game')||'tetris');title.textContent=(map[game]||game)+' Leaderboard';async function run(){try{let rows=[];if(window.InstantSync){const b=await window.InstantSync.fetchBoards([game]);rows=b[game]||[];status.textContent='Cloud leaderboard';}else{const r=await fetch('/api/leaderboard');const j=await r.json();rows=(j.boards&&j.boards[game])||[];status.textContent='API leaderboard';}rowsEl(rows);}catch{status.textContent='Leaderboard unavailable'}}function rowsEl(rows){const el=document.getElementById('rows');el.innerHTML=rows.length?rows.slice(0,50).map((r,i)=>`<li><strong>${r.name}</strong> — ${Math.floor(r.score)} ${i<3?'🏆':''}</li>`).join(''):'<li>No scores yet</li>';}run();</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
