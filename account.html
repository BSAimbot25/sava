<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sava Account Hub</title>
  <style>
    body{margin:0;font-family:Inter,system-ui;background:linear-gradient(160deg,#090f25,#12193f);color:#fff}
    .wrap{width:min(1100px,calc(100% - 24px));margin:18px auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .btn{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800;border:0;cursor:pointer}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    .card{background:#171f47;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:14px}
    input,textarea,select{width:100%;padding:10px;border-radius:10px;border:1px solid #ffffff33;background:#0d1434;color:#fff}
    textarea{min-height:90px}
    .role{display:inline-block;padding:6px 10px;border-radius:999px;font-weight:900}
    .master{background:#ffe700;color:#111}
    .slave{background:#7cc3ff;color:#05223c}
    .muted{opacity:.82}
    ul{margin:8px 0 0 18px}
    @media(max-width:860px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>👤 Sava Account Hub</h1>
      <div>
        <a class="btn" href="./index.html">Home</a>
        <a class="btn" href="./games.html">Games</a>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h3>Identity</h3>
        <p id="who" class="muted"></p>
        <p>Role: <span id="roleBadge" class="role slave">Silkin Slave</span></p>
        <p><a id="viewPublic" class="btn" href="#" style="display:inline-block;margin:6px 0">View Public Profile</a></p>
        <button id="logout" class="btn">Log out</button>
      </section>

      <section class="card">
        <h3>Profile</h3>
        <label>Display Name</label><input id="displayName" />
        <label>Avatar URL</label><input id="avatarUrl" placeholder="https://..." />
        <label>Status</label><input id="statusText" placeholder="Grinding Snus Clicker" />
        <label>Bio</label><textarea id="bio"></textarea>
        <label>Favorite Game</label>
        <select id="favGame">
          <option value="tetris">Tetris</option><option value="dodge">Dodge</option><option value="snake">Snake</option><option value="pong">Pong</option><option value="clicker">Face Clicker</option><option value="memory">Face Memory</option>
        </select>
        <button id="saveProfile" class="btn" style="margin-top:10px">Save Profile</button>
      </section>

      <section class="card">
        <h3>My Records</h3>
        <p class="muted">Joined: <span id="joinedAt">-</span></p>
        <p class="muted">Best Score: <span id="bestScore">0</span></p>
        <ul id="records"></ul>
      </section>

      <section class="card">
        <h3>My Notes</h3>
        <textarea id="notes" placeholder="Your private notes..."></textarea>
        <button id="saveNotes" class="btn" style="margin-top:10px">Save Notes</button>
      </section>
    </div>
  </div>

<script type="module" src="./instant.js"></script>
<script>
const USERS_KEY='sava_users_v1', CUR_KEY='sava_current_user_v1', SCORE_KEY='sava_arcade_v1';
function users(){try{return JSON.parse(localStorage.getItem(USERS_KEY)||'{}')}catch{return {}}}
function saveUsers(u){localStorage.setItem(USERS_KEY,JSON.stringify(u));}
function scores(){try{return JSON.parse(localStorage.getItem(SCORE_KEY)||'{}')}catch{return {}}}
const current=localStorage.getItem(CUR_KEY)||'';
if(!current){ location.href='./auth.html'; }

async function loadAccount(){
  let user=null;
  if(window.InstantSync){
    try{ user = await window.InstantSync.getCurrentUser(); }catch{}
  }
  if(!user){
    const u=users();
    if(!u[current]){
      // prevent mobile redirect loop: bootstrap minimal local shadow profile
      u[current]={pass:'',created:Date.now(),role:(current==='PapaSava')?'Master Sava':'Silkin Slave',displayName:current,bio:'',favGame:'tetris',notes:''};
      saveUsers(u);
    }
    u[current].role = (current==='PapaSava') ? 'Master Sava' : (u[current].role || 'Silkin Slave');
    saveUsers(u); user=u[current];
  }

  who.textContent=`Signed in as ${current}`;
  viewPublic.href='./profile.html?u='+encodeURIComponent(current);
  roleBadge.textContent=user.role||'Silkin Slave';
  roleBadge.className='role '+((user.role||'Silkin Slave')==='Master Sava'?'master':'slave');
  displayName.value=user.displayName||current;
  avatarUrl.value=user.avatarUrl||'';
  statusText.value=user.statusText||'';
  bio.value=user.bio||'';
  favGame.value=user.favGame||'tetris';
  notes.value=user.notes||'';
  joinedAt.textContent = new Date(user.createdAt || Date.now()).toLocaleString();

  saveProfile.onclick=async ()=>{
    const patch={displayName:displayName.value.trim()||current,avatarUrl:avatarUrl.value.trim(),statusText:statusText.value.trim(),bio:bio.value,favGame:favGame.value,notes:notes.value};
    if(window.InstantSync){ try{ await window.InstantSync.saveProfile(current,patch);}catch{} }
    const all=users(); all[current]=all[current]||{}; Object.assign(all[current],patch,{role:(current==='PapaSava')?'Master Sava':'Silkin Slave'}); saveUsers(all);
    alert('Profile saved');
  };

  saveNotes.onclick=async ()=>{
    if(window.InstantSync){ try{ await window.InstantSync.saveProfile(current,{notes:notes.value}); }catch{} }
    const all=users(); all[current]=all[current]||{}; all[current].notes=notes.value; saveUsers(all);
    alert('Notes saved');
  };

  logout.onclick=()=>{localStorage.removeItem(CUR_KEY);location.href='./auth.html';};

  if(window.InstantSync){
    try{
      const mine=await window.InstantSync.fetchUserScores(current);
      const best = mine.reduce((m,r)=>Math.max(m,Number(r.score||0)),0);
      bestScore.textContent = Math.floor(best).toLocaleString();
      records.innerHTML=mine.length?mine.slice(0,20).map(r=>`<li><strong>${r.game}</strong>: ${Math.floor(r.score)}</li>`).join(''):'<li>No records yet</li>';
      return;
    }catch{}
  }

  const rec=scores().records||{}; const mine=[];
  for(const [g,arr] of Object.entries(rec)){for(const r of arr||[]){if((r.name||'')===current) mine.push({g,score:r.score||0});}}
  mine.sort((a,b)=>b.score-a.score);
  const bestLocal = mine.reduce((m,r)=>Math.max(m,Number(r.score||0)),0);
  bestScore.textContent = Math.floor(bestLocal).toLocaleString();
  records.innerHTML=mine.length?mine.slice(0,20).map(r=>`<li><strong>${r.g}</strong>: ${Math.floor(r.score)}</li>`).join(''):'<li>No records yet</li>';
}

loadAccount();
</script>
<script type="module">import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script>
</body>
</html>
