<!doctype html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Snus Clicker</title><style>body{margin:0;background:#0a0f1f;color:#fff;font-family:system-ui}.wrap{width:min(1240px,calc(100% - 20px));margin:12px auto}.top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}.btn{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800;border:0;cursor:pointer}.hud{display:flex;gap:10px;flex-wrap:wrap}.pill{background:#171f3a;border:1px solid #2a3357;border-radius:999px;padding:6px 10px}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px;margin-top:10px}.panel{background:#171f3a;border:1px solid #2a3357;border-radius:14px;padding:12px}.big{display:grid;place-items:center;min-height:520px;position:relative;overflow:hidden}.snus{width:min(78vw,370px);aspect-ratio:1/1;border-radius:50%;border:6px solid #fff3;box-shadow:0 12px 35px #0008;cursor:pointer;user-select:none;transition:transform .06s ease,filter .1s}.snus:active{transform:scale(.95)}.floating{position:absolute;pointer-events:none;font-weight:900;color:#00ffc8;text-shadow:0 2px 8px #000;animation:rise .72s ease forwards}@keyframes rise{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-48px)}}.bar{height:10px;background:#101833;border:1px solid #2b3762;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#00ffc8,#5dffd8);width:0%}.small{font-size:.85rem;opacity:.85;margin-top:6px}.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0}.tag{background:#101833;border:1px solid #2b3762;border-radius:8px;padding:4px 8px;font-size:.85rem}.shop{max-height:520px;overflow:auto;display:grid;gap:8px}.item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#101833;border:1px solid #2b3762;border-radius:10px;padding:10px}.name{font-weight:800}.muted{opacity:.82;font-size:.9rem}.b{background:#00ffc8;color:#062d24;border:0;border-radius:10px;padding:8px 10px;font-weight:900;cursor:pointer}.b[disabled]{opacity:.5;cursor:not-allowed}.ach{margin-top:10px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.a{background:#101833;border:1px solid #2b3762;border-radius:10px;padding:8px;font-size:.9rem}.ok{border-color:#00ffc8}.taplab{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.tapbtn{background:#ff9f1a;color:#271300;border:0;border-radius:10px;padding:8px 6px;font-weight:900;cursor:pointer}.tapbtn[disabled]{opacity:.5}.cool{font-size:.82rem;opacity:.9}@media(max-width:980px){.grid{grid-template-columns:1fr}.big{min-height:340px}}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='./games.html'>← Menu</a><div class='hud'><div class='pill'>Snus: <b id='snus'>0</b></div><div class='pill'>Per click: <b id='pc'>1</b></div><div class='pill'>Per sec: <b id='ps'>0</b></div><div class='pill'>Multiplier: <b id='mult'>1.00x</b></div><div class='pill'>Cloud: <b id='cloudState'>Checking...</b></div></div><div><button class='btn' id='save'>Save</button> <button class='btn' id='reset'>Reset</button></div></div><div class='grid'><section class='panel big' id='playArea'><img id='clicker' class='snus' src='./can.jpg' alt='snus'/><div style='position:absolute;left:12px;bottom:12px;right:12px'><div class='bar'><div class='fill' id='comboFill'></div></div><div class='small'>Combo decay bar (faster clicks = bonus)</div></div></section><section class='panel'><h3 style='margin:0 0 6px'>Tap Boost Lab</h3><div class='taplab'><button class='tapbtn' id='tap1'>+1 Tap<br><span class='cool' id='tap1c'></span></button><button class='tapbtn' id='tap5'>+5 Tap<br><span class='cool' id='tap5c'></span></button><button class='tapbtn' id='tap25'>+25 Tap<br><span class='cool' id='tap25c'></span></button></div><div class='toolbar'><span class='tag'>Active:</span><button class='b' id='frenzy'>Frenzy x2 (10s)</button><span class='tag' id='frenzyCd'>Ready</span></div><h3 style='margin:10px 0 6px'>Snus Shop</h3><div class='toolbar'><span class='tag'>Buy mode:</span><button class='b' id='buy1'>x1</button><button class='b' id='buy10'>x10</button><button class='b' id='buy100'>x100</button></div><div class='shop' id='shop'></div><h3 style='margin:12px 0 8px'>Achievements</h3><div class='ach' id='ach'></div></section></div></div><script type='module' src='./instant.js'></script><script>const KEY='sava_snus_clicker_v3';const fmt=n=>{if(n<1e3)return Math.floor(n).toLocaleString();if(n<1e6)return (n/1e3).toFixed(1)+'K';if(n<1e9)return (n/1e6).toFixed(1)+'M';if(n<1e12)return (n/1e9).toFixed(1)+'B';return (n/1e12).toFixed(1)+'T'};const items=[{k:'fingers',n:'Sticky Fingers',base:15,pps:.18,d:'Auto taps tiny snus amounts'},{k:'runner',n:'Snus Runner',base:130,pps:1.4,d:'Delivers snus constantly'},{k:'shop',n:'Corner Snus Shop',base:1500,pps:11,d:'Small shop income'},{k:'truck',n:'Snus Truck',base:17000,pps:60,d:'Mobile heavy supply'},{k:'factory',n:'Snus Factory',base:190000,pps:360,d:'Mass snus production'},{k:'empire',n:'Snus Empire',base:2400000,pps:2200,d:'Global snus dominance'}];const upgrades=[{k:'click2',n:'Strong Thumb',cost:500,type:'click',mult:2},{k:'click5',n:'Iron Palm',cost:9000,type:'click',mult:2.4},{k:'click10',n:'Titan Grip',cost:140000,type:'click',mult:2.8},{k:'auto2',n:'Greased Machines',cost:15000,type:'auto',mult:2},{k:'auto4',n:'Overclocked Lines',cost:220000,type:'auto',mult:2.5},{k:'auto8',n:'Hyper Automation',cost:2600000,type:'auto',mult:2.8}];let s={snus:0,click:1,owned:{},upg:{},last:Date.now(),best:0,combo:0,tapBuys:{t1:0,t5:0,t25:0},frenzyUntil:0,frenzyCdUntil:0};let buyMode=1,lastTs=0,saveTick=0,scoreTick=0;const tapCost=(k)=>{const n=s.tapBuys[k]||0;const b={t1:120,t5:1400,t25:18000}[k];return Math.floor(b*Math.pow(1.22,n));};function cost(base,owned){return Math.floor(base*Math.pow(1.15,owned||0))}function multiCost(base,owned,n){let c=0;for(let i=0;i<n;i++)c+=cost(base,(owned||0)+i);return Math.floor(c)}function now(){return Date.now()}function frenzyMult(){return now()<s.frenzyUntil?2:1}function perSec(){let p=0;for(const it of items)p+=(s.owned[it.k]||0)*it.pps;for(const u of upgrades)if(s.upg[u.k]&&u.type==='auto')p*=u.mult;return p*frenzyMult()}function clickVal(){let c=s.click;for(const u of upgrades)if(s.upg[u.k]&&u.type==='click')c*=u.mult;const comboMult=1+Math.min(2.5,s.combo*0.02);return c*comboMult*frenzyMult()}function load(){try{const j=JSON.parse(localStorage.getItem(KEY)||'null');if(j)s={...s,...j,tapBuys:{t1:0,t5:0,t25:0,...(j.tapBuys||{})}}}catch{}}async function save(cloud=true){s.last=Date.now();localStorage.setItem(KEY,JSON.stringify(s));if(cloud&&window.InstantSync){try{await window.InstantSync.saveProgress('snus-clicker',s);}catch{}}}function flash(text,x,y){const n=document.createElement('div');n.className='floating';n.textContent='+'+fmt(text);n.style.left=x+'px';n.style.top=y+'px';playArea.appendChild(n);setTimeout(()=>n.remove(),740)}function renderHUD(){snus.textContent=fmt(s.snus);pc.textContent=fmt(clickVal());const p=perSec();ps.textContent=p.toFixed(1);const cm=(1+Math.min(2.5,s.combo*0.02))*frenzyMult();mult.textContent=cm.toFixed(2)+'x';comboFill.style.width=Math.max(0,Math.min(100,s.combo*4))+'%';s.best=Math.max(s.best,s.snus);const rem=Math.max(0,Math.ceil((s.frenzyCdUntil-now())/1000));frenzyCd.textContent=rem?('CD '+rem+'s'):(now()<s.frenzyUntil?'Active':'Ready')}function buyItem(k){const it=items.find(x=>x.k===k);const have=s.owned[k]||0;const c=multiCost(it.base,have,buyMode);if(s.snus<c)return;s.snus-=c;s.owned[k]=have+buyMode;render()}function buyUpgrade(k){const u=upgrades.find(x=>x.k===k);if(!u||s.upg[k]||s.snus<u.cost)return;s.snus-=u.cost;s.upg[k]=1;render()}function buyTap(kind,add){const c=tapCost(kind);if(s.snus<c)return;s.snus-=c;s.click+=add;s.tapBuys[kind]=(s.tapBuys[kind]||0)+1;render()}function useFrenzy(){if(now()<s.frenzyCdUntil)return;s.frenzyUntil=now()+10000;s.frenzyCdUntil=now()+45000;renderHUD()}function makeShop(){shop.innerHTML='';for(const it of items){const have=s.owned[it.k]||0;const c=multiCost(it.base,have,buyMode);const d=document.createElement('div');d.className='item';d.innerHTML=`<div><div class='name'>${it.n} x${have}</div><div class='muted'>+${it.pps}/s • ${it.d}</div><div class='muted'>Cost (${buyMode}): ${fmt(c)}</div></div><button class='b' ${s.snus<c?'disabled':''}>Buy</button>`;d.querySelector('button').onclick=()=>buyItem(it.k);shop.appendChild(d)}for(const u of upgrades){const d=document.createElement('div');d.className='item';d.innerHTML=`<div><div class='name'>${u.n} ${s.upg[u.k]?'✅':''}</div><div class='muted'>${u.type==='click'?'Click':'Auto'} x${u.mult}</div><div class='muted'>Cost: ${fmt(u.cost)}</div></div><button class='b' ${s.upg[u.k]||s.snus<u.cost?'disabled':''}>${s.upg[u.k]?'Owned':'Buy'}</button>`;d.querySelector('button').onclick=()=>buyUpgrade(u.k);shop.appendChild(d)}}function achievements(){const list=[['First Tap',s.snus>=1],['10K Snus',s.snus>=10000],['1M Snus',s.snus>=1e6],['Factory Owner',(s.owned.factory||0)>=1],['Empire Started',(s.owned.empire||0)>=1],['Auto 1K/s',perSec()>=1000],['Auto 10K/s',perSec()>=10000],['Combo Master',s.combo>=40],['Tap Machine',s.click>=500],['Frenzy User',s.frenzyCdUntil>0]];ach.innerHTML='';for(const [n,ok] of list){const d=document.createElement('div');d.className='a'+(ok?' ok':'');d.textContent=(ok?'🏆 ':'⬜ ')+n;ach.appendChild(d)}}function renderTapLab(){tap1c.textContent='Cost '+fmt(tapCost('t1'));tap5c.textContent='Cost '+fmt(tapCost('t5'));tap25c.textContent='Cost '+fmt(tapCost('t25'));tap1.disabled=s.snus<tapCost('t1');tap5.disabled=s.snus<tapCost('t5');tap25.disabled=s.snus<tapCost('t25');frenzy.disabled=now()<s.frenzyCdUntil}function render(){renderHUD();makeShop();renderTapLab();achievements()}async function recordSnus(score){try{if(window.InstantSync) await window.InstantSync.submitScore('snus',localStorage.getItem('sava_current_user_v1')||'Player',+score)}catch{}}clicker.addEventListener('pointerdown',e=>{const add=clickVal();s.snus+=add;s.combo=Math.min(85,s.combo+3.2);const r=clicker.getBoundingClientRect();flash(add,e.clientX-r.left+r.left-20,e.clientY-r.top+r.top-20);clicker.style.filter='brightness(1.12)';setTimeout(()=>clicker.style.filter='none',70);renderHUD();renderTapLab()});function setBuy(n){buyMode=n;[buy1,buy10,buy100].forEach(b=>b.style.opacity='.7');document.getElementById('buy'+n).style.opacity='1';render()}buy1.onclick=()=>setBuy(1);buy10.onclick=()=>setBuy(10);buy100.onclick=()=>setBuy(100);tap1.onclick=()=>buyTap('t1',1);tap5.onclick=()=>buyTap('t5',5);tap25.onclick=()=>buyTap('t25',25);frenzy.onclick=useFrenzy;save.onclick=()=>save(true);reset.onclick=()=>{if(confirm('Reset Snus Clicker?')){localStorage.removeItem(KEY);location.reload()}};

async function boot(){
  load();
  if(window.InstantSync){
    try{
      const st=await window.InstantSync.cloudStatus();
      cloudState.textContent=st.text;
      const remote=await window.InstantSync.loadProgress('snus-clicker');
      if(remote && Number(remote.snus||0) > Number(s.snus||0)) s={...s,...remote};
    }catch{ cloudState.textContent='Offline / retrying'; }
  } else { cloudState.textContent='Local only'; }
  const offlineSec=Math.max(0,Math.min(43200,(now()-(s.last||now()))/1000));
  s.snus+=perSec()*offlineSec;
  setBuy(1); render(); requestAnimationFrame(loop);
}

function loop(ts){if(!lastTs)lastTs=ts;const dt=Math.min(120,(ts-lastTs));lastTs=ts;const pps=perSec();s.snus += pps*(dt/1000);s.combo=Math.max(0,s.combo-dt*0.008);saveTick+=dt;scoreTick+=dt;if(saveTick>5000){save(true);saveTick=0}if(scoreTick>12000){recordSnus(Math.floor(s.snus));scoreTick=0}renderHUD();renderTapLab();requestAnimationFrame(loop)}setInterval(()=>{makeShop();achievements()},450);boot();</script><script type="module">import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script>
</body></html>
