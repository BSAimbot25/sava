<!doctype html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Snus Clicker</title><style>body{margin:0;background:#0a0f1f;color:#fff;font-family:system-ui}.wrap{width:min(1200px,calc(100% - 20px));margin:12px auto}.top{display:flex;justify-content:space-between;align-items:center;gap:8px}.btn{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800;border:0}.hud{display:flex;gap:12px;flex-wrap:wrap}.pill{background:#171f3a;border:1px solid #2a3357;border-radius:999px;padding:6px 10px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px;margin-top:10px}.panel{background:#171f3a;border:1px solid #2a3357;border-radius:14px;padding:12px}.big{display:grid;place-items:center;min-height:520px}.snus{width:min(78vw,360px);aspect-ratio:1/1;border-radius:50%;border:6px solid #fff2;box-shadow:0 12px 35px #0008;cursor:pointer;user-select:none;transition:transform .05s ease}.snus:active{transform:scale(.96)}.shop{max-height:520px;overflow:auto;display:grid;gap:8px}.item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#101833;border:1px solid #2b3762;border-radius:10px;padding:10px}.name{font-weight:800}.muted{opacity:.8;font-size:.9rem}.b{background:#00ffc8;color:#062d24;border:0;border-radius:10px;padding:8px 10px;font-weight:900;cursor:pointer}.ach{margin-top:10px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.a{background:#101833;border:1px solid #2b3762;border-radius:10px;padding:8px;font-size:.9rem}.ok{border-color:#00ffc8}@media(max-width:980px){.grid{grid-template-columns:1fr}.big{min-height:340px}}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='./games.html'>← Menu</a><div class='hud'><div class='pill'>Snus: <b id='snus'>0</b></div><div class='pill'>Per click: <b id='pc'>1</b></div><div class='pill'>Per sec: <b id='ps'>0</b></div></div><div><button class='btn' id='save'>Save</button> <button class='btn' id='reset'>Reset</button></div></div><div class='grid'><section class='panel big'><img id='clicker' class='snus' src='./can.jpg' alt='snus'/></section><section class='panel'><h3 style='margin:0 0 8px'>Snus Shop</h3><div class='shop' id='shop'></div><div class='ach' id='ach'></div></section></div></div><script>const KEY='sava_snus_clicker_v1';const fmt=n=>Math.floor(n).toLocaleString();const items=[{k:'fingers',n:'Sticky Fingers',base:15,pps:0.1,d:'Auto taps tiny snus amounts'},{k:'runner',n:'Snus Runner',base:100,pps:1,d:'Delivers snus constantly'},{k:'shop',n:'Corner Snus Shop',base:1100,pps:8,d:'Small shop income'},{k:'truck',n:'Snus Truck',base:12000,pps:47,d:'Mobile heavy supply'},{k:'factory',n:'Snus Factory',base:130000,pps:260,d:'Mass snus production'},{k:'empire',n:'Snus Empire',base:1400000,pps:1400,d:'Global snus dominance'}];const ups=[{k:'click2',n:'Strong Thumb',cost:300,type:'click',mult:2},{k:'click5',n:'Iron Palm',cost:5000,type:'click',mult:2.5},{k:'auto2',n:'Greased Machines',cost:7500,type:'auto',mult:2},{k:'auto4',n:'Overclocked Lines',cost:120000,type:'auto',mult:2}];let s={snus:0,click:1,owned:{},upg:{},last:Date.now()};function load(){try{const j=JSON.parse(localStorage.getItem(KEY)||'null');if(j)s={...s,...j};}catch{}}function save(){s.last=Date.now();localStorage.setItem(KEY,JSON.stringify(s));}function cost(base,owned){return Math.floor(base*Math.pow(1.15,owned||0));}function perSec(){let p=0;for(const it of items)p+=(s.owned[it.k]||0)*it.pps;for(const u of ups){if(s.upg[u.k]&&u.type==='auto')p*=u.mult;}return p;}function clickVal(){let c=s.click;for(const u of ups){if(s.upg[u.k]&&u.type==='click')c*=u.mult;}return c;}function add(v){s.snus+=v;render()}function buyItem(k){const it=items.find(x=>x.k===k);const c=cost(it.base,s.owned[k]||0);if(s.snus<c)return;s.snus-=c;s.owned[k]=(s.owned[k]||0)+1;render()}function buyUp(k){const u=ups.find(x=>x.k===k);if(s.upg[k]||s.snus<u.cost)return;s.snus-=u.cost;s.upg[k]=1;render()}function makeShop(){const el=document.getElementById('shop');el.innerHTML='';for(const it of items){const c=cost(it.base,s.owned[it.k]||0);const d=document.createElement('div');d.className='item';d.innerHTML=`<div><div class='name'>${it.n} x${s.owned[it.k]||0}</div><div class='muted'>+${it.pps}/s • ${it.d}</div><div class='muted'>Cost: ${fmt(c)}</div></div><button class='b'>Buy</button>`;d.querySelector('button').onclick=()=>buyItem(it.k);el.appendChild(d);}for(const u of ups){const d=document.createElement('div');d.className='item';d.innerHTML=`<div><div class='name'>${u.n} ${s.upg[u.k]?'✅':''}</div><div class='muted'>${u.type==='click'?'Click':'Auto'} x${u.mult}</div><div class='muted'>Cost: ${fmt(u.cost)}</div></div><button class='b'>${s.upg[u.k]?'Owned':'Buy'}</button>`;d.querySelector('button').onclick=()=>buyUp(u.k);el.appendChild(d);}}function achievements(){const list=[['First Tap',s.snus>=1],['1K Snus',s.snus>=1000],['100K Snus',s.snus>=100000],['Factory Owner',(s.owned.factory||0)>=1],['Empire Started',(s.owned.empire||0)>=1],['Auto 1K/s',perSec()>=1000]];const el=document.getElementById('ach');el.innerHTML='';for(const [n,ok] of list){const d=document.createElement('div');d.className='a'+(ok?' ok':'');d.textContent=(ok?'🏆 ':'⬜ ')+n;el.appendChild(d)}}function render(){document.getElementById('snus').textContent=fmt(s.snus);document.getElementById('pc').textContent=fmt(clickVal());document.getElementById('ps').textContent=perSec().toFixed(1);makeShop();achievements();save()}document.getElementById('clicker').onclick=()=>add(clickVal());document.getElementById('save').onclick=save;document.getElementById('reset').onclick=()=>{if(confirm('Reset Snus Clicker?')){localStorage.removeItem(KEY);location.reload();}};load();const dt=(Date.now()-(s.last||Date.now()))/1000;s.snus+=perSec()*Math.min(36000,Math.max(0,dt));setInterval(()=>{s.snus+=perSec();render()},1000);render();</script></body></html>
