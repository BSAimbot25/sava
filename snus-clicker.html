<!doctype html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'/><title>Snus Clicker MAX</title><style>body{margin:0;background:#0a0f1f;color:#fff;font-family:system-ui}*{user-select:none;-webkit-user-select:none}.wrap{width:min(1260px,calc(100% - 20px));margin:10px auto}.top{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:center}.btn{background:#ffe700;color:#111;padding:8px 12px;border-radius:999px;font-weight:800;border:0;text-decoration:none;cursor:pointer}.hud{display:flex;gap:8px;flex-wrap:wrap}.pill{background:#171f3a;border:1px solid #2a3357;border-radius:999px;padding:6px 10px}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px;margin-top:10px}.panel{background:#171f3a;border:1px solid #2a3357;border-radius:14px;padding:12px}.big{min-height:520px;display:grid;place-items:center;position:relative;overflow:hidden}.snus{width:min(78vw,380px);aspect-ratio:1/1;border-radius:50%;border:6px solid #fff3;box-shadow:0 12px 35px #0008;cursor:pointer;transition:transform .06s ease}.snus:active{transform:scale(.95)}.float{position:absolute;font-weight:900;color:#00ffc8;text-shadow:0 2px 8px #000;pointer-events:none;animation:r .7s ease forwards}@keyframes r{to{opacity:0;transform:translateY(-45px)}}.shop{max-height:510px;overflow:auto;display:grid;gap:8px}.item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#101833;border:1px solid #2b3762;border-radius:10px;padding:10px}.b{background:#00ffc8;color:#062d24;border:0;border-radius:10px;padding:8px 10px;font-weight:900;cursor:pointer}.b[disabled]{opacity:.5}.muted{opacity:.82;font-size:.9rem}.bar{height:10px;background:#101833;border:1px solid #2b3762;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#00ffc8,#5dffd8);width:0%}.row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}.tag{background:#101833;border:1px solid #2b3762;border-radius:8px;padding:4px 8px;font-size:.82rem}.ach{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.a{background:#101833;border:1px solid #2b3762;border-radius:10px;padding:8px;font-size:.9rem}.ok{border-color:#00ffc8}@media(max-width:980px){.grid{grid-template-columns:1fr}.big{min-height:340px}}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='./games.html'>← Menu</a><a class='btn' href='./leaderboard.html?game=snus'>Leaderboard</a><div class='hud'><div class='pill'>Snus: <b id='snus'>0</b></div><div class='pill'>Click: <b id='pc'>1</b></div><div class='pill'>Sec: <b id='ps'>0</b></div><div class='pill'>Combo: <b id='combo'>1.00x</b></div><div class='pill'>Prestige: <b id='prest'>0</b></div><div class='pill'>Cloud: <b id='cloud'>...</b></div></div><div><button class='btn' id='save'>Save</button> <button class='btn' id='reset'>Reset</button></div></div><div class='grid'><section class='panel big' id='play'><img id='sn' class='snus' src='./can.jpg' alt='snus'><div style='position:absolute;left:12px;bottom:12px;right:12px'><div class='bar'><div class='fill' id='cmb'></div></div><div class='muted'>Rapid taps build combo • Gold can appears randomly for jackpot</div></div></section><section class='panel'><h3 style='margin:0'>MAX Lab</h3><div class='row'><button class='b' id='tap1'>+1 Tap</button><button class='b' id='tap10'>+10 Tap</button><button class='b' id='tap50'>+50 Tap</button><button class='b' id='frenzy'>Frenzy x3</button><button class='b' id='prestigeBtn'>Prestige</button></div><div class='row'><span class='tag' id='daily'>Daily reward: checking...</span><span class='tag' id='frCd'>Frenzy: Ready</span></div><h3>Shop</h3><div class='row'><button class='b' id='buy1'>x1</button><button class='b' id='buy10'>x10</button><button class='b' id='buy100'>x100</button></div><div class='shop' id='shop'></div><h3>Achievements</h3><div class='ach' id='ach'></div></section></div></div><script type='module' src='./instant.js'></script><script>const KEY='sava_snus_clicker_max_v1';const me=()=>localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'Player';const fmt=n=>n<1e3?Math.floor(n).toLocaleString():n<1e6?(n/1e3).toFixed(1)+'K':n<1e9?(n/1e6).toFixed(1)+'M':n<1e12?(n/1e9).toFixed(1)+'B':(n/1e12).toFixed(1)+'T';const items=[['fingers','Sticky Fingers',15,.25],['runner','Snus Runner',160,1.8],['shop','Corner Shop',1800,13],['truck','Snus Truck',21000,74],['factory','Snus Factory',250000,430],['empire','Snus Empire',3300000,2800],['planet','Snus Planet',42000000,18000]];let s={snus:0,click:1,owned:{},upg:{},combo:0,last:Date.now(),prestige:0,frenzyUntil:0,frenzyCd:0,lastDaily:0};let buy=1,last=0,saveT=0,scoreT=0;const cst=(b,n)=>Math.floor(b*Math.pow(1.15,n||0));const mc=(b,n,q)=>{let t=0;for(let i=0;i<q;i++)t+=cst(b,(n||0)+i);return t};const pMul=()=>1+s.prestige*0.1;const frenzyMul=()=>Date.now()<s.frenzyUntil?3:1;const pps=()=>{let p=0;for(const [k,,base,v] of items)p+=(s.owned[k]||0)*v;return p*pMul()*frenzyMul()};const click=()=>s.click*(1+Math.min(2.8,s.combo*0.02))*pMul()*frenzyMul();function save(cloudSync=true){s.last=Date.now();localStorage.setItem(KEY,JSON.stringify(s));if(cloudSync&&window.InstantSync)window.InstantSync.saveProgress('snus-clicker',s).catch(()=>{});}function load(){try{const j=JSON.parse(localStorage.getItem(KEY)||'null');if(j)s={...s,...j};}catch{}}function puff(v,x,y){const e=document.createElement('div');e.className='float';e.textContent='+'+fmt(v);e.style.left=x+'px';e.style.top=y+'px';play.appendChild(e);setTimeout(()=>e.remove(),740)}function hud(){snus.textContent=fmt(s.snus);pc.textContent=fmt(click());ps.textContent=pps().toFixed(1);combo.textContent=(1+Math.min(2.8,s.combo*0.02)).toFixed(2)+'x';prest.textContent=s.prestige;cmb.style.width=Math.min(100,s.combo*3.5)+'%';frCd.textContent='Frenzy: '+(Date.now()<s.frenzyCd?Math.ceil((s.frenzyCd-Date.now())/1000)+'s':'Ready')}function shopR(){shop.innerHTML='';for(const [k,n,b,v] of items){const have=s.owned[k]||0;const cost=mc(b,have,buy);const d=document.createElement('div');d.className='item';d.innerHTML=`<div><b>${n} x${have}</b><div class='muted'>+${v}/s • Cost(${buy}): ${fmt(cost)}</div></div><button class='b' ${s.snus<cost?'disabled':''}>Buy</button>`;d.querySelector('button').onclick=()=>{if(s.snus<cost)return;s.snus-=cost;s.owned[k]=have+buy;render()};shop.appendChild(d)}}function achR(){const list=[['First Tap',s.snus>=1],['100K',s.snus>=1e5],['10M',s.snus>=1e7],['1B',s.snus>=1e9],['Factory', (s.owned.factory||0)>=1],['Planet', (s.owned.planet||0)>=1],['Prestiged',s.prestige>0],['Combo 50',s.combo>=50]];ach.innerHTML='';for(const [n,ok] of list){const d=document.createElement('div');d.className='a'+(ok?' ok':'');d.textContent=(ok?'🏆 ':'⬜ ')+n;ach.appendChild(d)}}function render(){hud();shopR();achR();save(false)}async function boot(){load();if(window.InstantSync){try{const st=await window.InstantSync.cloudStatus();cloud.textContent=st.text;const remote=await window.InstantSync.loadProgress('snus-clicker');if(remote&&Number(remote.snus||0)>Number(s.snus||0))s={...s,...remote};}catch{cloud.textContent='Offline'}}else cloud.textContent='Local';const off=Math.max(0,Math.min(43200,(Date.now()-(s.last||Date.now()))/1000));s.snus+=pps()*off;dailyReward();render();requestAnimationFrame(loop)}function dailyReward(){const day=Math.floor(Date.now()/86400000);if(s.lastDaily!==day){const bonus=Math.max(500,Math.floor(pps()*120+1000));s.snus+=bonus;s.lastDaily=day;daily.textContent='Daily reward claimed: +'+fmt(bonus);}else daily.textContent='Daily reward already claimed';}
sn.addEventListener('pointerdown',e=>{const r=sn.getBoundingClientRect();let add=click();if(Math.random()<0.04){add*=8;puff('JACKPOT x8',e.clientX-r.left+r.left-20,e.clientY-r.top+r.top-40);}s.snus+=add;s.combo=Math.min(90,s.combo+3.5);puff(add,e.clientX-r.left+r.left-20,e.clientY-r.top+r.top-20);render()},{passive:true});
function loop(ts){if(!last)last=ts;const dt=Math.min(120,ts-last);last=ts;s.snus+=pps()*(dt/1000);s.combo=Math.max(0,s.combo-dt*0.0085);saveT+=dt;scoreT+=dt;if(saveT>5000){save(true);saveT=0}if(scoreT>12000){if(window.InstantSync)window.InstantSync.submitScore('snus',me(),Math.floor(s.snus)).catch(()=>{});scoreT=0}hud();requestAnimationFrame(loop)}
function buyTap(cost,add){if(s.snus<cost)return;s.snus-=cost;s.click+=add;render()}tap1.onclick=()=>buyTap(200*(1+s.click*0.01),1);tap10.onclick=()=>buyTap(3000*(1+s.click*0.01),10);tap50.onclick=()=>buyTap(42000*(1+s.click*0.01),50);frenzy.onclick=()=>{if(Date.now()<s.frenzyCd)return;s.frenzyUntil=Date.now()+10000;s.frenzyCd=Date.now()+50000;hud();};prestigeBtn.onclick=()=>{const gain=Math.floor(Math.sqrt(s.snus/5e6));if(gain<1)return alert('Need more snus for prestige');if(!confirm('Prestige for +'+gain+' bonus levels?'))return;s.prestige+=gain;s.snus=0;s.click=1;s.owned={};s.upg={};s.combo=0;s.frenzyUntil=0;s.frenzyCd=0;render();};buy1.onclick=()=>{buy=1;render()};buy10.onclick=()=>{buy=10;render()};buy100.onclick=()=>{buy=100;render()};save.onclick=()=>save(true);reset.onclick=()=>{if(confirm('Reset Snus Clicker MAX?')){localStorage.removeItem(KEY);location.reload();}};boot();</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
