<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Snus 2048</title><style>body{margin:0;background:#0b1020;color:#fff;font-family:system-ui;touch-action:none}.top{display:flex;justify-content:space-between;align-items:center;padding:10px;gap:8px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}.board{width:min(94vw,460px);aspect-ratio:1/1;margin:10px auto;background:#1a234d;border:2px solid #fff;border-radius:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px}.cell{background:#121a3a;border-radius:8px;display:grid;place-items:center;font-weight:900;font-size:1.3rem}.v2{background:#3a4c8d}.v4{background:#4666b5}.v8{background:#527ce0}.v16{background:#6f8fff}.v32{background:#8a71ff}.v64{background:#b05fff}.v128{background:#ff7ad9}.v256{background:#ff6f8a}.v512{background:#ff995f}.v1024{background:#ffd05f;color:#111}.v2048{background:#fff200;color:#111}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><a class='btn' href='./leaderboard.html?game=snus2048'>Leaderboard</a><div id='hud'>Best tile: 2</div><button id='restart' class='btn'>Restart</button></div><div id='b' class='board'></div><script type='module' src='./instant.js'></script><script>const me=()=>localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'Player';async function record(score){try{if(window.InstantSync) await window.InstantSync.submitScore('snus2048',me(),score);}catch{} try{await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'snus2048',name:me(),score})});}catch{}}const b=document.getElementById('b');let g;function reset(){g=Array.from({length:4},()=>Array(4).fill(0));spawn();spawn();draw();}function spawn(){const e=[];for(let y=0;y<4;y++)for(let x=0;x<4;x++)if(!g[y][x])e.push([x,y]);if(!e.length)return;const [x,y]=e[(Math.random()*e.length)|0];g[y][x]=Math.random()<0.9?2:4;}function slide(arr){arr=arr.filter(Boolean);for(let i=0;i<arr.length-1;i++)if(arr[i]===arr[i+1]){arr[i]*=2;arr[i+1]=0;}arr=arr.filter(Boolean);while(arr.length<4)arr.push(0);return arr;}function move(dir){let moved=false;for(let i=0;i<4;i++){let line;if(dir==='L')line=g[i].slice();if(dir==='R')line=g[i].slice().reverse();if(dir==='U')line=[g[0][i],g[1][i],g[2][i],g[3][i]];if(dir==='D')line=[g[3][i],g[2][i],g[1][i],g[0][i]];const s=slide(line);if(line.join()!=s.join())moved=true;if(dir==='L')g[i]=s;if(dir==='R')g[i]=s.reverse();if(dir==='U'){for(let y=0;y<4;y++)g[y][i]=s[y]}if(dir==='D'){const r=s.reverse();for(let y=0;y<4;y++)g[y][i]=r[y]}}if(moved){spawn();draw();const mx=Math.max(...g.flat());if(mx>=2048)record(mx);}return moved;}function draw(){b.innerHTML='';const mx=Math.max(...g.flat());document.getElementById('hud').textContent='Best tile: '+mx;for(let y=0;y<4;y++)for(let x=0;x<4;x++){const v=g[y][x];const d=document.createElement('div');d.className='cell'+(v?(' v'+v):'');d.textContent=v||'';b.appendChild(d);}}addEventListener('keydown',e=>{if(e.key==='ArrowLeft')move('L');if(e.key==='ArrowRight')move('R');if(e.key==='ArrowUp')move('U');if(e.key==='ArrowDown')move('D');});let sx=0,sy=0;b.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY},{passive:true});b.addEventListener('pointerup',e=>{const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>Math.abs(dy)){dx>0?move('R'):move('L')}else{dy>0?move('D'):move('U')}},{passive:true});document.getElementById('restart').onclick=()=>reset();reset();</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
