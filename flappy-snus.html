<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Flappy Snus</title><style>body{margin:0;background:#081126;color:#fff;font-family:system-ui;touch-action:none}*{user-select:none;-webkit-user-select:none}.top{display:flex;justify-content:space-between;align-items:center;padding:10px;gap:8px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}.action{border:0;background:#1f2a55;color:#fff;border-radius:8px;padding:8px 10px;font-weight:800}canvas{display:block;margin:0 auto;border:2px solid #fff;border-radius:12px;background:#0f1b3c;max-width:96vw}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><a class='btn' href='./leaderboard.html?game=flappy'>Leaderboard</a><div id='hud'>Score: 0</div><button id='restart' class='action'>Restart</button></div><canvas id='c' width='420' height='700'></canvas><script type='module' src='./instant.js'></script><script>const me=()=>localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'Player';async function record(score){try{if(window.InstantSync) await window.InstantSync.submitScore('flappy',me(),score);}catch{} try{await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'flappy',name:me(),score})});}catch{}}const cv=document.getElementById('c'),x=cv.getContext('2d');const img=new Image();img.src='./can.jpg';let y,vy,pipes,score,over,last=0;function reset(){y=300;vy=0;pipes=[];score=0;over=false;for(let i=0;i<4;i++)spawn(500+i*230);hud();}function hud(){document.getElementById('hud').textContent='Score: '+score;}function spawn(px){const gap=170,top=120+Math.random()*320;pipes.push({x:px,top,gap,passed:false});}function flap(){if(over)return;vy=-7.2;}function step(ts){if(!last)last=ts;const dt=Math.min(34,ts-last)/16;last=ts;if(!over){vy+=0.42*dt;y+=vy*dt;if(y<18||y>682){over=true;record(score);}for(const p of pipes){p.x-=3.4*dt;if(!p.passed&&p.x<110){p.passed=true;score++;hud();}if(110+34>p.x&&110-34<p.x+70){if(y-34<p.top||y+34>p.top+p.gap){over=true;record(score);}}}if(pipes[0]&&pipes[0].x<-80)pipes.shift();while(pipes.length<5)spawn((pipes[pipes.length-1]?.x||500)+230);}draw();requestAnimationFrame(step)}function draw(){x.fillStyle='#0f1b3c';x.fillRect(0,0,420,700);x.fillStyle='#00ffc8';for(const p of pipes){x.fillRect(p.x,0,70,p.top);x.fillRect(p.x,p.top+p.gap,70,700-(p.top+p.gap));}x.save();x.beginPath();x.arc(110,y,34,0,Math.PI*2);x.clip();x.drawImage(img,76,y-34,68,68);x.restore();x.strokeStyle='#fff';x.lineWidth=2;x.beginPath();x.arc(110,y,34,0,Math.PI*2);x.stroke();if(over){x.fillStyle='rgba(0,0,0,.45)';x.fillRect(0,0,420,700);x.fillStyle='#fff';x.font='bold 40px system-ui';x.fillText('GAME OVER',95,330);x.font='20px system-ui';x.fillText('Tap Restart',155,365);}}cv.addEventListener('pointerdown',flap,{passive:true});addEventListener('keydown',e=>{if(e.code==='Space'||e.key==='ArrowUp')flap();});document.getElementById('restart').onclick=()=>reset();reset();requestAnimationFrame(step);</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
