<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Sava Friends</title><style>body{margin:0;background:#0a1020;color:#fff;font-family:system-ui}.wrap{width:min(980px,calc(100% - 18px));margin:14px auto}.top{display:flex;justify-content:space-between;align-items:center}.btn{background:#ffe700;color:#111;text-decoration:none;padding:8px 12px;border-radius:999px;font-weight:800}.card{background:#171f47;border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:10px;margin-top:10px}.row{display:flex;gap:8px;align-items:center;margin:8px 0}input{flex:1;padding:10px;border-radius:10px;border:1px solid #ffffff33;background:#0d1434;color:#fff}.user{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #ffffff18}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='./account.html'>← Account</a><h2 style='margin:0'>Friends</h2></div><section class='card'><div class='row'><input id='u' placeholder='Username'><button id='find' class='btn'>Open profile</button><button id='msg' class='btn'>Message</button></div><small>Use profile pages to follow/unfollow users.</small></section><section class='card'><h3 style='margin:0 0 8px'>Who you follow</h3><div id='list'></div></section></div><script type='module' src='./instant.js'></script><script>const me=localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'';find.onclick=()=>{const t=u.value.trim();if(!t)return;location.href='./profile.html?u='+encodeURIComponent(t)};msg.onclick=()=>{const t=u.value.trim();if(!t)return;location.href='./inbox.html?u='+encodeURIComponent(t)};async function load(){if(!window.InstantSync){try{await import('./instant.js')}catch{}}if(!window.InstantSync)return;const stats=[];const conv=await window.InstantSync.fetchConversations();list.innerHTML=conv.length?conv.map(c=>`<div class='user'><span>${c.other}</span><span><a class='btn' href='./profile.html?u=${encodeURIComponent(c.other)}'>Profile</a> <a class='btn' href='./inbox.html?u=${encodeURIComponent(c.other)}'>Chat</a></span></div>`).join(''):'<div class="user">No connections yet</div>';}load();</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
