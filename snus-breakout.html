<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Snus Breakout</title><style>body{margin:0;background:#0b1022;color:#fff;font-family:system-ui;touch-action:none}*{user-select:none;-webkit-user-select:none}.top{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px}.btn{background:#ffe700;color:#111;padding:7px 10px;border-radius:999px;text-decoration:none;font-weight:800}.action{border:0;background:#1f2a55;color:#fff;border-radius:8px;padding:8px 10px;font-weight:800}canvas{display:block;margin:0 auto;background:#101a33;border:2px solid #fff;border-radius:12px;max-width:96vw}</style></head><body><div class='top'><a class='btn' href='./games.html'>← Menu</a><a class='btn' href='./leaderboard.html?game=breakout'>Leaderboard</a><div id='hud'>Score: 0</div><button id='restart' class='action'>Restart</button></div><canvas id='c' width='800' height='480'></canvas><script type='module' src='./instant.js'></script><script>const me=()=>localStorage.getItem('sava_current_user_v1')||localStorage.getItem('sava_last_user_v1')||'Player';async function record(score){try{if(window.InstantSync) await window.InstantSync.submitScore('breakout',me(),score);}catch{} try{await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'breakout',name:me(),score})});}catch{}}const cv=document.getElementById('c'),x=cv.getContext('2d');let paddle,ball,bricks,score,lives,last=0,targetX=400,over=false;function init(){paddle={x:350,y:450,w:100,h:12};ball={x:400,y:280,vx:220,vy:-240,r:8};score=0;lives=3;over=false;bricks=[];const rows=6,cols=10,bw=72,bh=20,gx=8,ox=20,oy=40;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)bricks.push({x:ox+c*(bw+gx),y:oy+r*(bh+8),w:bw,h:bh,hp:1+r%2});hud();}function hud(){document.getElementById('hud').textContent=`Score: ${score} • Lives: ${lives}`;}function step(ts){if(!last)last=ts;const dt=Math.min(34,(ts-last))/1000;last=ts;if(!over){paddle.x += (targetX-paddle.w/2-paddle.x)*Math.min(1,dt*12);paddle.x=Math.max(0,Math.min(800-paddle.w,paddle.x));ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;if(ball.x<ball.r||ball.x>800-ball.r)ball.vx*=-1;if(ball.y<ball.r)ball.vy=Math.abs(ball.vy);if(ball.y>480+20){lives--;if(lives<=0){over=true;record(score);}else{ball={x:400,y:280,vx:220*(Math.random()>.5?1:-1),vy:-240,r:8};}hud();}if(ball.y+ball.r>paddle.y&&ball.y-ball.r<paddle.y+paddle.h&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w&&ball.vy>0){const rel=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);ball.vx=rel*340;ball.vy=-Math.abs(ball.vy);}for(const b of bricks){if(!b.hp)continue;if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){b.hp--;score+=20;ball.vy*=-1;hud();break;}}if(bricks.every(b=>!b.hp)){over=true;score+=500;record(score);hud();}}draw();requestAnimationFrame(step)}function draw(){x.fillStyle='#101a33';x.fillRect(0,0,800,480);for(const b of bricks){if(!b.hp)continue;x.fillStyle=b.hp===2?'#00ffc8':'#ffe700';x.fillRect(b.x,b.y,b.w,b.h);}x.fillStyle='#fff';x.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);x.beginPath();x.arc(ball.x,ball.y,ball.r,0,Math.PI*2);x.fill();if(over){x.fillStyle='rgba(0,0,0,.45)';x.fillRect(0,0,800,480);x.fillStyle='#fff';x.font='bold 38px system-ui';x.fillText('GAME OVER',285,235);x.font='20px system-ui';x.fillText('Tap Restart',345,270);}}cv.addEventListener('pointermove',e=>{const r=cv.getBoundingClientRect();targetX=(e.clientX-r.left)*(800/r.width);},{passive:true});cv.addEventListener('pointerdown',e=>{const r=cv.getBoundingClientRect();targetX=(e.clientX-r.left)*(800/r.width);},{passive:true});addEventListener('keydown',e=>{if(e.key==='ArrowLeft')targetX-=30;if(e.key==='ArrowRight')targetX+=30});document.getElementById('restart').onclick=()=>init();init();requestAnimationFrame(step);</script><script type='module'>import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script></body></html>
